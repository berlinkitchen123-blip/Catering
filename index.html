<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bella & Bona Kitchen</title>
<style>
:root {
  --bg: #090b10;
  --s1: #0f1219;
  --s2: #161a26;
  --s3: #1e2233;
  --border: #252a3f;
  --border2: #343b58;
  --accent: #f0c040;
  --accent2: #f0c04022;
  --blue: #5b9cf6;
  --green: #4ade80;
  --purple: #c084fc;
  --red: #f87171;
  --orange: #fb923c;
  --text: #eef0ff;
  --sub: #8890b0;
  --dim: #4a506a;
  --r: 14px;
  --r2: 10px;
  --r3: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOPBAR ── */
.topbar {
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  height: 56px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
  z-index: 100;
}
.topbar-back {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--s3);
  border: 1px solid var(--border2);
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  color: var(--text);
  transition: .15s;
  flex-shrink: 0;
}
.topbar-back:hover { background: var(--border2); }
.topbar-back.show { display: flex; }
.topbar-logo { font-size: 15px; font-weight: 800; color: var(--accent); letter-spacing: -.3px; }
.topbar-breadcrumb { font-size: 13px; color: var(--sub); display: flex; align-items: center; gap: 6px; }
.topbar-breadcrumb .sep { color: var(--dim); }
.topbar-breadcrumb .current { color: var(--text); font-weight: 600; }
.topbar-spacer { flex: 1; }
.topbar-week { font-size: 11px; color: var(--sub); background: var(--s3); padding: 4px 10px; border-radius: 20px; white-space: nowrap; }

/* ── HAMBURGER BUTTON ── */
.hamburger {
  width: 36px; height: 36px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 5px; cursor: pointer;
  border-radius: 8px;
  transition: .15s;
  flex-shrink: 0;
}
.hamburger:hover { background: var(--s3); }
.hamburger span {
  display: block; width: 20px; height: 2px;
  background: var(--sub);
  border-radius: 2px;
  transition: .2s;
}
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); background: var(--accent); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); background: var(--accent); }

/* ── DRAWER OVERLAY ── */
.drawer-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 150;
  backdrop-filter: blur(2px);
}
.drawer-overlay.show { display: block; }

/* ── SIDE DRAWER ── */
.drawer {
  position: fixed;
  top: 0; right: 0;
  width: 280px; height: 100vh;
  background: var(--s1);
  border-left: 1px solid var(--border);
  z-index: 200;
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform .28s cubic-bezier(.4,0,.2,1);
  overflow: hidden;
}
.drawer.open { transform: translateX(0); }
.drawer-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.drawer-logo { font-size: 18px; font-weight: 900; color: var(--accent); margin-bottom: 4px; }
.drawer-week { font-size: 12px; color: var(--sub); }
.drawer-nav { flex: 1; overflow-y: auto; padding: 10px 0; }
.drawer-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 13px 20px;
  cursor: pointer;
  color: var(--sub);
  font-size: 14px;
  font-weight: 600;
  transition: .15s;
  border-left: 3px solid transparent;
  position: relative;
}
.drawer-item:hover { background: var(--s2); color: var(--text); }
.drawer-item.active { background: var(--s2); color: var(--accent); border-left-color: var(--accent); }
.drawer-item-icon { font-size: 20px; width: 28px; text-align: center; flex-shrink: 0; }
.drawer-item-label { flex: 1; }
.drawer-item-badge {
  font-size: 10px; font-weight: 800;
  padding: 2px 8px; border-radius: 10px;
  background: var(--s3); color: var(--dim);
}
.drawer-item.active .drawer-item-badge { background: var(--accent2); color: var(--accent); }
.drawer-divider { height: 1px; background: var(--border); margin: 8px 20px; }
.drawer-section-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; color: var(--dim); padding: 10px 20px 4px; }
.drawer-footer { padding: 14px 20px; border-top: 1px solid var(--border); }
.drawer-lock {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px;
  border-radius: 10px;
  background: var(--s2);
  border: 1px solid var(--border);
  cursor: pointer;
  font-size: 13px; font-weight: 700;
  color: var(--sub);
  transition: .15s;
}
.drawer-lock:hover { border-color: var(--border2); color: var(--text); }
.drawer-lock.unlocked { border-color: rgba(74,222,128,.3); color: var(--green); }
/* ── keep bnav-dot for drawer ── */
.bnav-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
.bnav-dot.unlocked { background: var(--green); }

/* ── SCREENS (full scroll area) ── */
.screen-stack { flex: 1; overflow: hidden; position: relative; }
.screen {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  overflow-x: hidden;
  display: none;
  -webkit-overflow-scrolling: touch;
}
.screen.active { display: block; }

/* Slide animation */
.screen.slide-in { animation: slideIn .25s ease forwards; }
.screen.slide-out { animation: slideOut .25s ease forwards; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-30%); opacity: 0; } }

/* ── HOME SCREEN ── */
.day-strip {
  position: sticky;
  top: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  z-index: 50;
}
.day-chip {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  font-size: 12px;
  font-weight: 700;
  color: var(--sub);
  cursor: pointer;
  transition: .15s;
}
.day-chip:hover { border-color: var(--border2); color: var(--text); }
.day-chip.active { background: var(--accent); color: #000; border-color: var(--accent); }
.day-chip .dc-date { font-size: 11px; font-weight: 600; opacity: .7; margin-top: 1px; }

.event-grid {
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.event-card {
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  cursor: pointer;
  transition: .2s;
  overflow: hidden;
  position: relative;
}
.event-card:hover { border-color: var(--border2); transform: translateY(-1px); box-shadow: 0 8px 32px rgba(0,0,0,.4); }
.event-card:active { transform: translateY(0); }
.event-card-accent { height: 4px; }
.event-card-body { padding: 18px 20px; }
.ec-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
.ec-client { font-size: 22px; font-weight: 800; line-height: 1.1; }
.ec-arrow { color: var(--sub); font-size: 22px; margin-top: 4px; flex-shrink: 0; }
.ec-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
}
.pill-blue { background: #162540; color: var(--blue); }
.pill-purple { background: #201535; color: var(--purple); }
.pill-green { background: #0f2a18; color: var(--green); }
.pill-orange { background: #2a1a0a; color: var(--orange); }
.pill-red { background: #2a1010; color: var(--red); }
.pill-dim { background: var(--s3); color: var(--sub); }
.ec-info { display: flex; flex-wrap: wrap; gap: 8px 20px; font-size: 12px; color: var(--sub); border-top: 1px solid var(--border); padding-top: 12px; }
.ec-info-item { display: flex; align-items: center; gap: 5px; }
.ec-progress { margin-top: 12px; }
.ec-progress-label { font-size: 11px; color: var(--dim); margin-bottom: 4px; display: flex; justify-content: space-between; }
.ec-progress-bar { height: 4px; background: var(--s3); border-radius: 2px; overflow: hidden; }
.ec-progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: .4s; }

/* ── EVENT DETAIL SCREEN ── */
.event-detail-hero {
  padding: 12px 16px 10px;
  background: var(--s1);
  border-bottom: 1px solid var(--border);
}
.edh-client { font-size: 20px; font-weight: 900; margin-bottom: 6px; }
.edh-pills { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
.edh-info { display: flex; flex-wrap: wrap; gap: 4px 16px; }
.edh-info-card { display: flex; align-items: center; gap: 5px; padding: 2px 0; }
.edh-info-label { font-size: 11px; font-weight: 600; color: var(--dim); }
.edh-info-value { font-size: 12px; font-weight: 600; color: var(--sub); }

/* Sub-tabs */
.sub-tabs {
  position: sticky;
  top: 0;
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  display: flex;
  overflow-x: auto;
  z-index: 40;
}
.sub-tab {
  flex-shrink: 0;
  padding: 9px 14px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--dim);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: .15s;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.sub-tab:hover { color: var(--sub); }
.sub-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.sub-tab .st-badge {
  background: var(--s3);
  color: var(--sub);
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
}
.sub-tab.active .st-badge { background: var(--accent2); color: var(--accent); }

.sub-panel { display: none; padding: 12px 14px; }
.sub-panel.active { display: block; }

/* ── CHECKLIST ── */
.checklist { display: flex; flex-direction: column; gap: 8px; }
.check-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  cursor: pointer;
  transition: .2s;
  user-select: none;
}
.check-item:hover { border-color: var(--border2); }
.check-item.done { background: #0d2015; border-color: #1c3d28; }
.check-item.done .check-label { text-decoration: line-through; color: var(--sub); }
.check-box {
  width: 22px; height: 22px;
  border: 2px solid var(--border2);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: .2s;
  font-size: 13px;
  color: transparent;
}
.check-item.done .check-box { background: var(--green); border-color: var(--green); color: #000; }
.check-label { font-size: 14px; flex: 1; }
.checklist-progress { margin-bottom: 16px; }
.cp-bar { height: 6px; background: var(--s3); border-radius: 3px; overflow: hidden; margin-top: 6px; }
.cp-fill { height: 100%; background: var(--green); border-radius: 3px; transition: .4s; }
.cp-text { font-size: 12px; color: var(--sub); display: flex; justify-content: space-between; }

/* ── MENU ── */
.menu-list { display: flex; flex-direction: column; gap: 10px; }
.menu-item {
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.menu-item-name { font-size: 14px; font-weight: 700; flex: 1; }
.menu-item-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.menu-portions { font-size: 18px; font-weight: 800; color: var(--accent); }
.menu-pkg { font-size: 11px; color: var(--sub); }

/* ── RECIPE LIST ── */
.recipe-list { display: flex; flex-direction: column; gap: 6px; }
.recipe-section-title { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: var(--accent); margin-bottom: 6px; }
.recipe-card {
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  overflow: hidden;
}
.recipe-card-header {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  cursor: pointer;
  transition: .15s;
}
.recipe-card-header:hover { background: var(--s3); }
.recipe-card.open .recipe-card-header { background: var(--s3); }
.rch-name { font-size: 13px; font-weight: 700; flex: 1; }
.rch-pills { display: flex; gap: 5px; flex-wrap: wrap; }
.rch-arrow { color: var(--sub); font-size: 18px; transition: .2s; }
.recipe-card.open .rch-arrow { transform: rotate(90deg); }
.recipe-card-body { display: none; border-top: 1px solid var(--border); }
.recipe-card.open .recipe-card-body { display: block; }
.recipe-inner-tabs { display: flex; overflow-x: auto; border-bottom: 1px solid var(--border); background: var(--bg); }
.rit { flex-shrink: 0; padding: 7px 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--dim); cursor: pointer; border-bottom: 2px solid transparent; }
.rit:hover { color: var(--sub); }
.rit.active { color: var(--blue); border-bottom-color: var(--blue); }
.rit-panel { display: none; padding: 10px 12px; }
.rit-panel.active { display: block; }

/* ── DATA TABLE ── */
.dt { width: 100%; border-collapse: collapse; font-size: 13px; }
.dt th { text-align: left; padding: 8px 10px; background: var(--bg); color: var(--sub); font-size: 10px; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); font-weight: 700; }
.dt td { padding: 9px 10px; border-bottom: 1px solid rgba(37,42,63,.7); vertical-align: middle; }
.dt tr:last-child td { border-bottom: none; }
.dt .highlight { color: var(--accent); font-weight: 700; }
.dt .sub { color: var(--sub); font-size: 12px; }

/* ── DIET BADGE ── */
.diet { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
.dm { background: #3a1c1c; color: #fca5a5; }
.dv { background: #163320; color: #86efac; }
.dvg { background: #1b3020; color: #bbf7d0; }
.df { background: #1a2a3f; color: #93c5fd; }
.do { background: #2c2618; color: #fde68a; }

/* ── SCHED CARDS ── */
.sched-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
.sched-card { background: var(--s2); border: 1px solid var(--border); border-radius: var(--r2); padding: 14px; }
.sched-val { font-size: 20px; font-weight: 800; color: var(--accent); }
.sched-key { font-size: 11px; color: var(--sub); margin-top: 3px; font-weight: 600; }

/* ── BOM / ORDERS ── */
.bom-section { background: var(--s2); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 16px; overflow: hidden; }
.bom-section-header { padding: 14px 18px; background: var(--s3); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.bom-section-title { font-size: 15px; font-weight: 800; flex: 1; }
.bom-section-body { padding: 0 18px 14px; }

/* ── SECTION LABEL ── */
.sec-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--sub); margin: 16px 0 8px; }
.sec-label:first-child { margin-top: 0; }

/* ── PASSWORD ── */
.pw-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 500; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
.pw-overlay.show { display: flex; }
.pw-box { background: var(--s2); border: 1px solid var(--border); border-radius: 20px; padding: 40px 32px; width: 100%; max-width: 340px; text-align: center; box-shadow: 0 32px 80px rgba(0,0,0,.6); }
.pw-icon { font-size: 40px; margin-bottom: 16px; }
.pw-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.pw-sub { font-size: 13px; color: var(--sub); margin-bottom: 28px; }
.pw-input { width: 100%; padding: 14px; background: var(--s3); border: 2px solid var(--border2); border-radius: var(--r2); color: var(--text); font-size: 20px; text-align: center; letter-spacing: .3em; outline: none; transition: .15s; }
.pw-input:focus { border-color: var(--accent); }
.pw-btn { margin-top: 14px; width: 100%; padding: 14px; background: var(--accent); color: #000; font-weight: 800; font-size: 15px; border: none; border-radius: var(--r2); cursor: pointer; }
.pw-btn:active { opacity: .85; }
.pw-err { color: var(--red); font-size: 13px; margin-top: 10px; min-height: 18px; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
.shake { animation: shake .35s; }

/* ── EMPTY ── */
.empty { text-align: center; padding: 60px 20px; color: var(--dim); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 14px; }

/* ── PAGE TITLES ── */
.page-hero { padding: 20px 20px 0; }
.page-title { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
.page-sub { font-size: 13px; color: var(--sub); margin-bottom: 20px; }

@media (min-width: 700px) {
  .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
  .checklist { display: grid; grid-template-columns: 1fr 1fr; }
}

/* ── CREATOR EDITOR ── */
.creator-event-card {
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  margin-bottom: 10px;
  overflow: hidden;
}
.creator-event-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
}
.creator-event-name { font-size: 15px; font-weight: 800; flex: 1; }
.creator-event-meta { font-size: 12px; color: var(--sub); }
.btn-edit {
  background: var(--s3);
  border: 1px solid var(--border2);
  color: var(--sub);
  padding: 5px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
}
.btn-edit:hover { color: var(--fg); border-color: var(--blue); }
.btn-primary {
  background: var(--accent);
  color: #000;
  border: none;
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
}
.btn-primary:hover { opacity: .85; }
.btn-secondary {
  background: var(--s3);
  color: var(--fg);
  border: 1px solid var(--border2);
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}
.btn-secondary:hover { border-color: var(--blue); }
/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
  padding: 0;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
}
.modal-title { font-size: 18px; font-weight: 900; margin-bottom: 16px; }
/* ── FORM FIELDS ── */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--sub); margin-bottom: 5px; }
.form-input {
  width: 100%;
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--fg);
  font-size: 14px;
  padding: 10px 12px;
  box-sizing: border-box;
  font-family: inherit;
}
.form-input:focus { outline: none; border-color: var(--blue); }
.form-row { display: flex; gap: 10px; }
.form-row .form-group { flex: 1; }
.form-section-title { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .06em; margin: 16px 0 8px; }
.menu-edit-row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
.menu-edit-row .form-input { flex: 1; }

.btn-add-row { background: none; border: 1px dashed var(--border2); color: var(--sub); padding: 8px 14px; border-radius: 8px; font-size: 12px; cursor: pointer; width: 100%; margin-top: 4px; }
.btn-add-row:hover { border-color: var(--blue); color: var(--blue); }
.custom-badge { background: #162540; color: var(--blue); font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 8px; }


/* ── OMS BAR ── */
.oms-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;

  background: rgba(240,192,64,.08);
  border: 1px solid rgba(240,192,64,.25);
  border-radius: 10px;
}
.oms-label { font-size: 12px; font-weight: 700; color: var(--accent); }
.oms-input {
  width: 72px;
  background: var(--s2);
  border: 1px solid var(--accent);
  border-radius: 8px;
  color: var(--accent);
  font-size: 18px;
  font-weight: 900;
  text-align: center;
  padding: 6px 8px;
  font-family: inherit;
}
.oms-input:focus { outline: none; box-shadow: 0 0 0 2px rgba(240,192,64,.3); }
.oms-hint { font-size: 11px; color: var(--sub); }
/* ── PORTIONS DISPLAY ── */
.portions-total { font-size: 20px; font-weight: 900; color: var(--accent); }
.portions-breakdown { font-size: 11px; color: var(--sub); }
.portions-oms { font-size: 13px; font-weight: 700; color: var(--orange); }
/* ── MENU CARDS redesign ── */
.menu-list { display: flex; flex-direction: column; gap: 8px; }
.menu-item {
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.menu-item-left { flex: 1; min-width: 0; }
.menu-item-name { font-size: 14px; font-weight: 700; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.menu-item-badges { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.menu-pkg-badge { font-size: 11px; color: var(--sub); background: var(--s3); border: 1px solid var(--border); border-radius: 6px; padding: 2px 7px; }
.menu-item-right { text-align: right; flex-shrink: 0; }


/* ── PER-DISH OMS ── */
.oms-dish-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  padding: 7px 10px;
  background: rgba(240,192,64,.06);
  border: 1px solid rgba(240,192,64,.18);
  border-radius: 8px;
}
.oms-dish-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: var(--accent); flex-shrink: 0; }
.oms-dish-input {

  background: var(--s3);
  border: 1px solid var(--accent);
  border-radius: 6px;
  color: var(--accent);
  font-size: 15px; font-weight: 900;
  text-align: center;
  padding: 4px 6px;

}
.oms-dish-input:focus { outline: none; box-shadow: 0 0 0 2px rgba(240,192,64,.25); }
.oms-dish-op { font-size: 12px; color: var(--sub); flex-shrink: 0; }
.oms-dish-total { font-size: 18px; font-weight: 900; color: var(--accent); min-width: 28px; text-align: center; }
.oms-dish-unit { font-size: 10px; color: var(--dim); }
.menu-item { flex-direction: column; align-items: stretch; }
.menu-item-right { display: none; }


/* ── DIET FILTER BUTTONS ── */
.diet-filter-btn {
  flex-shrink: 0;
  padding: 5px 13px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--s2);
  color: var(--sub);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
}
.diet-filter-btn.active { background: var(--accent2); color: var(--accent); border-color: rgba(240,192,64,.3); }

/* ── MASTER ITEM CARD ── */
.master-item {

  align-items: center;
  gap: 10px;
  padding: 10px 12px;

.master-allergen { font-size: 10px; color: var(--sub); max-width: 140px; text-align: right; }

/* ── AUTOCOMPLETE DROPDOWN ── */
.ac-wrap { position: relative; }
.ac-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  background: var(--s1);
  border: 1px solid var(--border2);
  border-radius: 10px;
  max-height: 220px;
  overflow-y: auto;
  z-index: 300;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);

.ac-dropdown.show { display: block; }
.ac-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;

  border-bottom: 1px solid var(--border);
  transition: .1s;
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.focused { background: var(--s2); }
.ac-item-name { font-size: 13px; font-weight: 600; flex: 1; }

  {id:'home', icon:'&#127968;', label:'Events'},
  {id:'bom',  icon:'&#128230;', label:'BOM'},
  {id:'master', icon:'&#128218;', label:'Master Data'},
  {id:'creator', icon:'&#128274;', label:'Creator', isLock:true},
  {id:'creator-editor', icon:'&#9998;', label:'Manage', creatorOnly:true},
  {id:'orders', icon:'&#128203;', label:'Orders', creatorOnly:true},
  {id:'ingredients', icon:'&#129378;', label:'Quantities', creatorOnly:true},
];
function buildBottomNav(){ buildDrawer(); } // alias
function buildDrawer(){
  const nav=document.getElementById('drawer-nav');
  nav.innerHTML='';

  // Main items
  const mainItems=[
    {id:'home', icon:'&#127968;', label:'Events'},
    {id:'bom',  icon:'&#128230;', label:'BOM'},
  {id:'master', icon:'&#128218;', label:'Master Data'},
  ];
  mainItems.forEach(function(item){
    const el=document.createElement('div');
    const isActive=currentScreen===item.id||(currentScreen==='home'&&item.id==='home')||(currentScreen==='event'&&item.id==='home');
    el.className='drawer-item'+(isActive?' active':'');
    el.innerHTML='<div class="drawer-item-icon">'+item.icon+'</div><div class="drawer-item-label">'+item.label+'</div>';
    el.onclick=(function(id){ return function(){ handleNavClick(id); closeDrawer(); }; })(item.id);
    nav.appendChild(el);
  });

  if(creatorUnlocked){
    // Creator section
    const div=document.createElement('div');
    div.className='drawer-divider'; nav.appendChild(div);
    const lbl=document.createElement('div');
    lbl.className='drawer-section-label'; lbl.textContent='Creator';
    nav.appendChild(lbl);
    const creatorItems=[
      {id:'creator-editor', icon:'&#9998;', label:'Manage Events'},
      {id:'orders',         icon:'&#128203;', label:'Client Orders'},
      {id:'ingredients',    icon:'&#129378;', label:'Order Quantities'},
    ];
    creatorItems.forEach(function(item){
      const el=document.createElement('div');
      const isActive=currentScreen===item.id;
      el.className='drawer-item'+(isActive?' active':'');
      el.innerHTML='<div class="drawer-item-icon">'+item.icon+'</div><div class="drawer-item-label">'+item.label+'</div>';
      el.onclick=(function(id){ return function(){ handleNavClick(id); closeDrawer(); }; })(item.id);
      nav.appendChild(el);
    });
  }

  // Footer lock button
  const lockBtn=document.getElementById('drawer-lock-btn');
  if(lockBtn){
    lockBtn.className='drawer-lock'+(creatorUnlocked?' unlocked':'');
    lockBtn.innerHTML=creatorUnlocked
      ? '&#128275; <span>Lock Creator</span>'
      : '&#128274; <span>Creator Access</span>';
    lockBtn.onclick=function(){ if(creatorUnlocked){ lockCreator(); closeDrawer(); } else { closeDrawer(); setTimeout(openPw, 200); } };
  }
}
function toggleDrawer(){
  const d=document.getElementById('drawer');
  const o=document.getElementById('drawer-overlay');
  const h=document.getElementById('hamburger-btn');
  const isOpen=d.classList.contains('open');
  if(isOpen){ closeDrawer(); } else { d.classList.add('open'); o.classList.add('show'); h.classList.add('open'); }
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('show');
  document.getElementById('hamburger-btn').classList.remove('open');
}
function handleNavClick(id){
  if(id==='home'){ showScreen('home'); return; }
  showScreen(id);
}
function showScreen(id, animate){
  const prev=currentScreen;
  currentScreen=id;
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active','slide-in','slide-out'); });
  const target=document.getElementById('screen-'+id);
  if(target){
    if(animate==='forward'){ target.classList.add('active','slide-in'); }
    else { target.classList.add('active'); }
  }
  // Topbar
  const back=document.getElementById('topbar-back');
  const bc=document.getElementById('topbar-breadcrumb');
  if(id==='event' && currentEvent){
    back.classList.add('show');
    bc.innerHTML='<span>'+esc(currentEvent.date.split(' ')[0])+'</span><span class="sep">&#8250;</span><span class="current">'+esc(currentEvent.client)+'</span>';
  } else {
    back.classList.remove('show');
    bc.innerHTML='';
  }
  buildBottomNav();
}
function goBack(){
  showScreen('home');
}

/* ── PASSWORD ── */
function openPw(){ document.getElementById('pw-overlay').classList.add('show'); setTimeout(function(){ document.getElementById('pw-input').focus(); },60); }
function closePw(){ document.getElementById('pw-overlay').classList.remove('show'); document.getElementById('pw-input').value=''; document.getElementById('pw-err').textContent=''; }
function checkPw(){
  const v=document.getElementById('pw-input').value;
  if(v===CREATOR_PW){
    creatorUnlocked=true; closePw();
    buildOrdersScreen(); buildIngredientsScreen(); buildCreatorEditor();
    buildBottomNav(); showScreen('creator-editor');
  } else {
    const inp=document.getElementById('pw-input');
    inp.classList.remove('shake'); void inp.offsetWidth; inp.classList.add('shake');
    document.getElementById('pw-err').textContent='Wrong password.'; inp.value='';
  }
}
function lockCreator(){
  creatorUnlocked=false;
  document.getElementById('orders-body').innerHTML='';
  document.getElementById('ingredients-body').innerHTML='';
  buildDrawer(); showScreen('home');
}
document.getElementById('pw-input').addEventListener('keydown',function(e){ if(e.key==='Enter') checkPw(); });
document.getElementById('pw-overlay').addEventListener('click',function(e){ if(e.target===document.getElementById('pw-overlay')) closePw(); });

/* ── HOME SCREEN ── */
function buildDayStrip(){
  const strip=document.getElementById('day-strip');
  strip.innerHTML='';
  DAYS.forEach(function(d,i){
    const evs=EVENTS.filter(function(e){return e.date===d;});
    const parts=d.split(' ');
    const el=document.createElement('div');
    el.className='day-chip'+(i===currentDay?' active':'');
    el.dataset.day=i;
    el.innerHTML='<div style="font-weight:800">'+esc(parts[0])+'</div><div class="dc-date">'+(parts[1]||'')+'</div>';
    el.onclick=function(){ selectDay(+this.dataset.day); };
    strip.appendChild(el);
  });
}
function selectDay(i){
  currentDay=i;
  document.querySelectorAll('.day-chip').forEach(function(el,j){ el.classList.toggle('active',j===i); });
  renderHomeDay(i);
}
function renderHomeDay(i){
  const d=DAYS[i];
  const evs=EVENTS.filter(function(e){ return e.date===d; });
  const grid=document.getElementById('event-grid');
  grid.innerHTML=evs.map(function(ev){ return renderHomeCard(ev); }).join('') ||
    '<div class="empty"><div class="empty-icon">&#128197;</div><div class="empty-text">No events this day</div></div>';
}
function renderHomeCard(ev){
  const eid=eventId(ev);
  const accent=eventAccent(ev);
  const ck=checkedCount(ev);
  const pct=ck.total>0?Math.round(ck.done/ck.total*100):0;
  const evIdx=EVENTS.indexOf(ev);
  let h='<div class="event-card" data-evidx="'+evIdx+'" onclick="openEvent(+this.dataset.evidx)">';
  h+='<div class="event-card-accent" style="background:'+accent+'"></div>';
  h+='<div class="event-card-body">';
  h+='<div class="ec-top"><div class="ec-client">'+esc(ev.client)+'</div><div class="ec-arrow">&#8250;</div></div>';
  h+='<div class="ec-pills">';
  h+='<span class="pill pill-blue">&#128101; '+esc(ev.guests)+'</span>';
  h+='<span class="pill pill-purple">'+esc(ev.event_type)+'</span>';
  if(ev.schedule&&ev.schedule['Delivery']) h+='<span class="pill pill-green">&#128666; '+esc(ev.schedule['Delivery'])+'</span>';
  if(ev.schedule&&ev.schedule['Food ready by']) h+='<span class="pill pill-orange">&#9200; '+esc(ev.schedule['Food ready by'])+'</span>';
  h+='</div>';
  // Info row
  if(ev.location&&ev.location!=='—'){
    h+='<div class="ec-info"><div class="ec-info-item">&#128205; '+esc(ev.location)+'</div>';
    if(ev.contact&&ev.contact!=='—') h+='<div class="ec-info-item">&#128100; '+esc(ev.contact)+'</div>';
    h+='</div>';
  }
  // Progress bar
  if(ck.total>0){
    h+='<div class="ec-progress">';
    h+='<div class="ec-progress-label"><span style="color:var(--sub)">Equipment</span><span style="color:'+(pct===100?'var(--green)':'var(--sub)')+'">'+ck.done+'/'+ck.total+'</span></div>';
    h+='<div class="ec-progress-bar"><div class="ec-progress-fill" style="width:'+pct+'%"></div></div>';
    h+='</div>';
  }
  h+='</div></div>';
  return h;
}

/* ── EVENT DETAIL SCREEN ── */
function openEvent(idx){
  const ev=EVENTS[idx];
  currentEvent=ev;
  const eid=eventId(ev);
  const accent=eventAccent(ev);

  // Hero
  let hero='<div class="event-detail-hero" style="border-top:4px solid '+accent+'">';
  hero+='<div class="edh-client">'+esc(ev.client)+'</div>';
  hero+='<div class="edh-pills">';
  hero+='<span class="pill pill-blue">&#128101; '+esc(ev.guests)+'</span>';
  hero+='<span class="pill pill-purple">'+esc(ev.event_type)+'</span>';
  if(ev.schedule&&ev.schedule['Delivery']) hero+='<span class="pill pill-green">&#128666; '+esc(ev.schedule['Delivery'])+'</span>';
  if(ev.schedule&&ev.schedule['Food ready by']) hero+='<span class="pill pill-orange">&#9200; Ready '+esc(ev.schedule['Food ready by'])+'</span>';
  hero+='</div>';
  // Info cards
  const infoItems=[];
  if(ev.location&&ev.location!=='—') infoItems.push({k:'Location',v:ev.location});
  if(ev.contact&&ev.contact!=='—') infoItems.push({k:'Contact',v:ev.contact+(ev.phone&&ev.phone!=='—'?' · '+ev.phone:'')});
  if(ev.schedule&&ev.schedule['Event start']) infoItems.push({k:'Event Start',v:ev.schedule['Event start']});
  if(ev.schedule&&ev.schedule['Staffing']) infoItems.push({k:'Staffing',v:ev.schedule['Staffing']});
  if(infoItems.length){
    hero+='<div class="edh-info">';
    infoItems.forEach(function(item){ hero+='<div class="edh-info-card"><div class="edh-info-label">'+esc(item.k)+':</div><div class="edh-info-value">'+esc(item.v)+'</div></div>'; });
    hero+='</div>';
  }
  hero+='</div>';
  document.getElementById('event-hero').innerHTML=hero;

  // Sub-tabs
  const hasEquip=ev.equipment&&ev.equipment.length;
  const hasRecipes=ev.recipes&&Object.keys(ev.recipes).length;
  const hasSched=ev.schedule&&Object.keys(ev.schedule).length;
  const tabs=[];
  if(hasEquip) tabs.push({id:'equip',label:'&#9745; Equipment',count:ev.equipment.length});
  tabs.push({id:'menu',label:'&#127869; Menu',count:(ev.menu||[]).length});
  if(hasRecipes) tabs.push({id:'recipes',label:'&#128218; Recipes',count:Object.keys(ev.recipes).length});
  if(hasSched) tabs.push({id:'sched',label:'&#128336; Schedule'});

  const tabsEl=document.getElementById('sub-tabs');
  tabsEl.innerHTML=tabs.map(function(t,i){
    const cnt=t.count?'<span class="st-badge">'+t.count+'</span>':'';
    return '<div class="sub-tab'+(i===0?' active':'')+'" data-panel="'+t.id+'" onclick="switchSubTab(this)">'+t.label+cnt+'</div>';
  }).join('');

  // Panels
  let panels='';
  // Equipment
  if(hasEquip){
    panels+='<div class="sub-panel active" id="sp-equip"><div id="equip-progress-'+eid+'"></div><div class="checklist">';
    ev.equipment.forEach(function(item,idx){
      const key=eid+'-eq-'+idx;
      panels+='<div class="check-item" id="ci-'+key+'" data-key="'+key+'" data-eid="'+eid+'" onclick="toggleCheck(this.dataset.key,this.dataset.eid)">';
      panels+='<div class="check-box">&#10003;</div>';
      panels+='<input type="checkbox" id="'+key+'" style="display:none"><span class="check-label">'+esc(item)+'</span></div>';
    });
    panels+='</div></div>';
  }
  // Menu
  panels+='<div class="sub-panel'+(hasEquip?'':' active')+'" id="sp-menu"><div class="menu-list">';
  if(!omsValues[eid]) omsValues[eid]={};
  (ev.menu||[]).forEach(function(item){
    const p=parseOMSOffset(item.portions);
    const dishKey=item.name;
    const dishOMS=omsValues[eid][dishKey]||0;
    panels+='<div class="menu-item">';
    panels+='<div class="menu-item-left">';
    panels+='<div class="menu-item-name">'+esc(item.name)+'</div>';
    panels+='<div class="menu-item-badges">';
    if(item.diet&&item.diet!=='—') panels+='<span class="diet '+dietClass(item.diet)+'">'+esc(item.diet)+'</span>';
    if(item.packaging) panels+='<span class="menu-pkg-badge">'+esc(item.packaging)+'</span>';
    panels+='</div>';
    if(p&&p.type==='oms'){
      panels+='<div class="oms-dish-row">';
      panels+='<span class="oms-dish-label">OMS</span>';
      panels+='<input class="oms-dish-input" type="number" min="0" value="'+esc(String(dishOMS||''))+'" placeholder="0" data-eid="'+eid+'" data-dish="'+esc(dishKey)+'" data-offset="'+p.offset+'" oninput="updateDishOMS(this)">';
      panels+='<span class="oms-dish-op">+'+(p.offset)+'=</span>';
      panels+='<span class="oms-dish-total" id="odt-'+safeId(eid+dishKey)+'">'+((dishOMS?dishOMS+p.offset:'?'))+'</span>';
      panels+='<span class="oms-dish-unit">portions</span>';
      panels+='</div>';
    }
    panels+='</div>';
    panels+='<div class="menu-item-right">';
    if(!p||p.type!=='oms') panels+=formatPortionsDisplay(item.portions, 0);
    panels+='</div>';
    panels+='</div>';
  });
  panels+='</div></div>';
  // Recipes
  if(hasRecipes){
    panels+='<div class="sub-panel" id="sp-recipes"><div class="recipe-list">';
    Object.keys(ev.recipes).forEach(function(rname){
      const rd=ev.recipes[rname];
      const rid=safeId(eid+'-'+rname);
      panels+='<div class="recipe-card open" id="rc-'+rid+'">';
      panels+='<div class="recipe-card-header" data-rid="'+rid+'" onclick="toggleRecipe(this.dataset.rid)">';
      panels+='<div class="rch-name">'+esc(rname)+'</div>';
      panels+='<div class="rch-pills">';
      if(rd.portions) panels+='<span class="pill pill-blue" style="font-size:11px">'+esc(rd.portions)+'</span>';
      if(rd.diet) panels+='<span class="diet '+dietClass(rd.diet)+'">'+esc(rd.diet)+'</span>';
      if(rd.allergens) panels+='<span class="pill pill-red" style="font-size:11px">&#9888;</span>';
      panels+='</div><div class="rch-arrow">&#8250;</div></div>';
      panels+='<div class="recipe-card-body" style="padding:12px 14px;display:flex;flex-direction:column;gap:14px">';
      // Info row (allergens + meta)
      if(rd.allergens||rd.category||rd.portions){
        panels+='<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">';
        if(rd.allergens) panels+='<span class="pill pill-red" style="font-size:11px">&#9888; '+esc(rd.allergens)+'</span>';
        if(rd.category) panels+='<span class="pill pill-dim" style="font-size:11px">'+esc(rd.category)+'</span>';
        panels+='</div>';
      }
      // Ingredients
      if(rd.ingredients&&rd.ingredients.length){
        panels+='<div>';
        panels+='<div class="recipe-section-title">Ingredients</div>';
        panels+='<table class="dt"><thead><tr><th>Ingredient</th><th>Qty/Portion</th><th>Unit</th><th>Total</th></tr></thead><tbody>';
        const dishOMS2=(omsValues[eid]&&omsValues[eid][rname])||0;
      const recipePortions=calcPortions(rd.portions, dishOMS2);
        rd.ingredients.forEach(function(ing){
          const tot=recipePortions?calcIngTotal(ing,recipePortions):(ing.total_or_notes||'');
          const isNote=tot&&isNaN(parseFloat(tot))&&tot.length>6;
          panels+='<tr><td>'+esc(ing.name)+'</td><td>'+esc(ing.qty_per_portion||'')+'</td><td class="sub">'+esc(ing.unit||'')+'</td><td class="'+(isNote?'sub':'highlight')+'">'+esc(tot)+'</td></tr>';
        });
        panels+='</tbody></table></div>';
      }
      // Prep steps
      if(rd.steps&&rd.steps.length){
        panels+='<div>';
        panels+='<div class="recipe-section-title">Preparation</div>';
        panels+='<table class="dt"><thead><tr><th style="width:44px">Step</th><th>Action</th><th>Notes</th></tr></thead><tbody>';
        rd.steps.forEach(function(s){ panels+='<tr><td class="highlight">'+esc(s.step)+'</td><td>'+esc(s.action)+'</td><td class="sub">'+esc(s.notes)+'</td></tr>'; });
        panels+='</tbody></table></div>';
      }
      // Cooking
      if(rd.cooking&&rd.cooking.length){
        panels+='<div>';
        panels+='<div class="recipe-section-title">Cooking</div>';
        panels+='<table class="dt"><thead><tr><th>Stage</th><th>Mode</th><th>Temp</th><th>Time</th><th>Hum.</th></tr></thead><tbody>';
        rd.cooking.forEach(function(c){ panels+='<tr><td>'+esc(c.stage)+'</td><td>'+esc(c.mode)+'</td><td class="highlight">'+esc(c.temp)+'</td><td class="highlight">'+esc(c.time)+'</td><td class="sub">'+esc(c.humidity)+'</td></tr>'; });
        panels+='</tbody></table></div>';
      }
      // Logistics
      if(rd.logistics&&Object.keys(rd.logistics).length){
        panels+='<div>';
        panels+='<div class="recipe-section-title">Logistics</div>';
        panels+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px">';
        Object.keys(rd.logistics).forEach(function(k){
          panels+='<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 11px">';
          panels+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--sub);margin-bottom:3px">'+esc(k)+'</div>';
          panels+='<div style="font-size:13px">'+esc(rd.logistics[k])+'</div></div>';
        });
        panels+='</div></div>';
      }
      panels+='</div></div>';
    });
    panels+='</div></div>';
  }
  // Schedule
  if(hasSched){
    panels+='<div class="sub-panel" id="sp-sched"><div class="sched-grid">';
    Object.keys(ev.schedule).forEach(function(k){
      if(!ev.schedule[k]) return;
      panels+='<div class="sched-card"><div class="sched-val">'+esc(ev.schedule[k])+'</div><div class="sched-key">'+esc(k)+'</div></div>';
    });
    panels+='</div></div>';
  }

  document.getElementById('sub-panels').innerHTML=panels;
  document.getElementById('screen-event').scrollTop=0;
  showScreen('event','forward');
  loadChecklists([ev]);
  updateEquipProgress(ev);
}

function switchSubTab(tab){
  const pid=tab.dataset.panel;
  tab.closest('.sub-tabs').querySelectorAll('.sub-tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('#sub-panels .sub-panel').forEach(function(p){ p.classList.remove('active'); });
  tab.classList.add('active');
  const panel=document.getElementById('sp-'+pid);
  if(panel) panel.classList.add('active');
}
function switchRecipeTab(tab){
  const rid=tab.dataset.rid, rtab=tab.dataset.rtab;
  tab.closest('.recipe-inner-tabs').querySelectorAll('.rit').forEach(function(t){ t.classList.remove('active'); });
  const body=tab.closest('.recipe-card-body');
  body.querySelectorAll('.rit-panel').forEach(function(p){ p.classList.remove('active'); });
  tab.classList.add('active');
  const panel=document.getElementById('rp-'+rid+'-'+rtab);
  if(panel) panel.classList.add('active');
}
function toggleRecipe(rid){
  const card=document.getElementById('rc-'+rid);
  if(card) card.classList.toggle('open');
}

/* ── CHECKLIST ── */
function toggleCheck(key,eid){
  const cb=document.getElementById(key); if(!cb) return;
  cb.checked=!cb.checked;
  const ci=document.getElementById('ci-'+key); if(ci) ci.classList.toggle('done',cb.checked);
  checklistState[key]=cb.checked;
  db.collection('checklists').doc(eid).set(checklistState,{merge:true}).catch(function(){});
  if(currentEvent) updateEquipProgress(currentEvent);
  // Update home card progress
  refreshHomeCards();
}
function updateEquipProgress(ev){
  const eid=eventId(ev);
  const el=document.getElementById('equip-progress-'+eid);
  if(!el||!ev.equipment) return;
  const total=ev.equipment.length;
  const done=ev.equipment.filter(function(_,i){ return checklistState[eid+'-eq-'+i]; }).length;
  const pct=total>0?Math.round(done/total*100):0;
  const allDone=done===total&&total>0;
  el.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
    +'<span style="font-size:13px;color:var(--sub)">'+done+' of '+total+' checked</span>'
    +'<span style="font-size:13px;font-weight:700;color:'+(allDone?'var(--green)':'var(--sub)')+'">'+pct+'%</span></div>'
    +'<div style="height:6px;background:var(--s3);border-radius:3px;overflow:hidden;margin-bottom:16px">'
    +'<div style="height:100%;width:'+pct+'%;background:var(--green);border-radius:3px;transition:.4s"></div></div>';
}
function loadChecklists(evs){
  fbListeners.forEach(function(u){u();}); fbListeners=[];
  evs.forEach(function(ev){
    const eid=eventId(ev);
    fbListeners.push(db.collection('checklists').doc(eid).onSnapshot(function(snap){
      if(!snap.exists) return;
      Object.entries(snap.data()).forEach(function(kv){
        checklistState[kv[0]]=kv[1];
        const el=document.getElementById(kv[0]),ci=document.getElementById('ci-'+kv[0]);
        if(el) el.checked=kv[1]; if(ci) ci.classList.toggle('done',kv[1]);
      });
      if(currentEvent) updateEquipProgress(currentEvent);
    }));
  });
}
function refreshHomeCards(){
  if(currentScreen==='home') renderHomeDay(currentDay);
}

/* ── BOM ── */
function buildBomScreen(){
  document.getElementById('bom-sub').textContent = WEEK;
  let h='';
  EVENTS.forEach(function(ev){
    if(!ev.bom_summary||!ev.bom_summary.length) return;
    h+='<div class="bom-section"><div class="bom-section-header">';
    h+='<div class="bom-section-title">'+esc(ev.client)+'</div>';
    h+='<span class="pill pill-dim">'+esc(ev.date)+'</span>';
    h+='<span class="pill pill-blue">'+esc(ev.guests)+' guests</span></div>';
    h+='<div class="bom-section-body"><table class="dt" style="margin-top:12px"><thead><tr><th>Recipe</th><th>Ingredient</th><th>Total</th><th>Unit</th></tr></thead><tbody>';

/* ── FIREBASE CUSTOM EVENTS ── */
function loadCustomEvents(){
  try {
    db.collection('custom_events').orderBy('createdAt','desc').onSnapshot(function(snap){
      customEvents = [];
      snap.forEach(function(doc){
        customEvents.push(Object.assign({_id: doc.id, _custom: true}, doc.data()));
      });
      // Rebuild EVENTS and DAYS
      EVENTS = _D.events.slice().concat(customEvents);
      DAYS = Array.from(new Set(EVENTS.map(function(e){ return e.date; })));
      buildDayStrip();
      renderHomeDay(currentDay);
      if(creatorUnlocked) buildCreatorEditor();
    });
  } catch(e){ console.warn('Firebase custom events error', e); }
}

function renderEditForm(ev){
  const v = function(f){ return esc(ev ? (ev[f]||'') : ''); };
  let h = '';
  // Parse existing date for picker
  let existingDateISO = '';
  if(ev && ev.date){

    if(dm) existingDateISO = dm[3]+'-'+dm[2]+'-'+dm[1];
  }
  h += '<div class="form-row">';
  h += '<div class="form-group" style="flex:2"><div class="form-label">Client Name</div><input class="form-input" id="ef-client" value="' + v('client') + '" placeholder="Client name"></div>';
  h += '<div class="form-group" style="max-width:90px"><div class="form-label">Guests</div><input class="form-input" id="ef-guests" value="' + v('guests') + '" placeholder="0" type="number"></div>';
  h += '</div>';
  h += '<div class="form-row">';
  h += '<div class="form-group"><div class="form-label">&#128197; Date</div><input class="form-input" id="ef-date-picker" type="date" value="'+existingDateISO+'" oninput="syncDateDisplay()"></div>';
  h += '<div class="form-group"><div class="form-label">&#8987; Event Time</div><input class="form-input" id="ef-event-time" type="time" value="' + esc((ev&&ev.event_time)||'') + '"></div>';
  h += '</div>';
  h += '<div class="form-row">';
  h += '<div class="form-group"><div class="form-label">&#9201; Food Ready By</div><input class="form-input" id="ef-food-ready" type="time" value="' + esc((ev&&ev.food_ready_by)||'') + '"></div>';
  h += '<div class="form-group"><div class="form-label">Event Type</div><input class="form-input" id="ef-type" value="' + v('event_type') + '" placeholder="e.g. Buffet"></div>';
  h += '</div>';
  h += '<div class="form-group"><div class="form-label">&#128205; Location</div><input class="form-input" id="ef-location" value="' + v('location') + '" placeholder="Address"></div>';
  h += '<div class="form-row">';
  h += '<div class="form-group"><div class="form-label">&#128100; Contact</div><input class="form-input" id="ef-contact" value="' + v('contact') + '" placeholder="Name"></div>';
  h += '<div class="form-group"><div class="form-label">&#128222; Phone</div><input class="form-input" id="ef-phone" value="' + v('phone') + '" placeholder="+49..."></div>';
  h += '</div>';
  h += '<div class="form-group"><div class="form-label">&#128115; Prepared By</div><input class="form-input" id="ef-preparedby" value="' + esc((ev&&ev.prepared_by)||'') + '" placeholder="Chef name / team"></div>';

function renderMenuRow(m, i){
  return '<div class="menu-edit-row" id="ef-mrow-' + i + '">' +
    '<div class="ac-wrap" style="flex:1">' +
    '<input class="form-input" placeholder="Dish name" value="' + esc(m.name||'') + '" data-idx="'+i+'" oninput="editingMenuRows['+i+'].name=this.value" onmousedown="this._ac=true">' +

    '<button class="btn-remove" onclick="removeMenuRow(' + i + ')">✕</button>' +
    '</div>';

function addMenuRow(){
  editingMenuRows.push({name:'',portions:'',diet:'',packaging:''});
  const container = document.getElementById('ef-menu-rows');
  const i = editingMenuRows.length - 1;
  const div = document.createElement('div');
  div.innerHTML = renderMenuRow({}, i);
  const newEl = div.firstChild;
  container.appendChild(newEl);
  const newInp = newEl.querySelector('.ac-wrap input');
  if(newInp) initAutocomplete(newInp);
}

function removeMenuRow(i){
  editingMenuRows.splice(i, 1);
  // Re-render menu rows section
  const container = document.getElementById('ef-menu-rows');
  container.innerHTML = '';
  editingMenuRows.forEach(function(m, j){
    container.insertAdjacentHTML('beforeend', renderMenuRow(m, j));
  });
}

function saveEditForm(){
  const client = document.getElementById('ef-client').value.trim();
  const dateISO = document.getElementById('ef-date-picker').value;
  if(!client || !dateISO){ alert('Client name and date are required.'); return; }
  // Format date as "Monday 15/06/2026"
  const dp = new Date(dateISO+'T00:00:00');
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dd=String(dp.getDate()).padStart(2,'0');
  const mm=String(dp.getMonth()+1).padStart(2,'0');
  const yyyy=dp.getFullYear();
  const dateStr = days[dp.getDay()]+' '+dd+'/'+mm+'/'+yyyy;
  const evData = {
    client: client,
    date: dateStr,
    guests: document.getElementById('ef-guests').value.trim() || '0',
    event_type: document.getElementById('ef-type').value.trim() || 'Event',
    event_time: document.getElementById('ef-event-time').value || '',
    food_ready_by: document.getElementById('ef-food-ready').value || '',
    prepared_by: document.getElementById('ef-preparedby').value.trim() || '',
    location: document.getElementById('ef-location').value.trim() || '—',
    contact: document.getElementById('ef-contact').value.trim() || '—',
    phone: document.getElementById('ef-phone').value.trim() || '—',
    notes: document.getElementById('ef-notes').value.trim(),
    menu: editingMenuRows.filter(function(m){ return m.name; }),
    equipment: [], schedule: {}, recipes: {}, bom_summary: [], order_qtys: []
  };
  closeEditModal();
  // Save to Firebase
  try {
    if(editingIdx >= 0 && EVENTS[editingIdx]._custom){
      // Update existing custom event
      db.collection('custom_events').doc(EVENTS[editingIdx]._id).set(
        Object.assign(evData, {createdAt: EVENTS[editingIdx].createdAt || new Date().toISOString()})
      );
    } else if(editingIdx >= 0) {
      // Override static event — store in overrides collection
      db.collection('event_overrides').doc(
        (EVENTS[editingIdx].date + '-' + EVENTS[editingIdx].client).toLowerCase().replace(/[^a-z0-9]+/g,'-')
      ).set(evData);
      // Update local copy immediately
      Object.assign(EVENTS[editingIdx], evData);
      buildCreatorEditor();
      buildOrdersScreen(); buildIngredientsScreen();
      renderHomeDay(currentDay);
    } else {
      // New custom event
      evData.createdAt = new Date().toISOString();
      db.collection('custom_events').add(evData);
    }
  } catch(e){
    console.warn('Firebase save error', e);
    // Still update locally
    if(editingIdx < 0){
      EVENTS.push(evData);
      DAYS = Array.from(new Set(EVENTS.map(function(e){ return e.date; })));
      buildDayStrip(); renderHomeDay(currentDay);
    }
    buildCreatorEditor();
  }
}

function updateDishOMS(input){
  const eid=input.dataset.eid;
  const dish=input.dataset.dish;
  const offset=parseInt(input.dataset.offset)||0;
  const val=parseInt(input.value)||0;
  if(!omsValues[eid]) omsValues[eid]={};
  omsValues[eid][dish]=val;
  const total=val+offset;
  // Update total display
  const totalEl=document.getElementById('odt-'+safeId(eid+dish));
  if(totalEl) totalEl.textContent=val?total:'?';
  // Re-scale this recipe's ingredient totals
  if(currentEvent&&currentEvent.recipes&&currentEvent.recipes[dish]){
    const rd=currentEvent.recipes[dish];
    if(!rd.ingredients||!rd.ingredients.length) return;
    const rid=safeId(eid+'-'+dish);
    const tbody=document.querySelector('#rc-'+rid+' .dt tbody');
    if(!tbody) return;
    tbody.innerHTML=rd.ingredients.map(function(ing){
      const tot=val?calcIngTotal(ing,total):(ing.total_or_notes||'');
      const isNote=tot&&isNaN(parseFloat(tot))&&tot.length>6;
      return '<tr><td>'+esc(ing.name)+'</td><td>'+esc(ing.qty_per_portion||'')+'</td><td class="sub">'+esc(ing.unit||'')+'</td><td class="'+(isNote?'sub':'highlight')+'">'+esc(tot)+'</td></tr>';
    }).join('');
  }
}

/* ── AUTOCOMPLETE ── */
let acFocusIdx = -1;
function initAutocomplete(input){
  const wrap = input.closest('.ac-wrap');
  if(!wrap) return;
  let dd = wrap.querySelector('.ac-dropdown');
  if(!dd){
    dd = document.createElement('div');
    dd.className = 'ac-dropdown';
    wrap.appendChild(dd);
  }
  input.addEventListener('input', function(){
    showAC(input, dd);
  });
  input.addEventListener('keydown', function(e){
    const items = dd.querySelectorAll('.ac-item');
    if(e.key==='ArrowDown'){ e.preventDefault(); acFocusIdx=Math.min(acFocusIdx+1,items.length-1); highlightAC(items); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); acFocusIdx=Math.max(acFocusIdx-1,-1); highlightAC(items); }
    else if(e.key==='Enter' && acFocusIdx>=0){ e.preventDefault(); items[acFocusIdx].click(); }
    else if(e.key==='Escape'){ dd.classList.remove('show'); }
  });
  document.addEventListener('click', function(e){
    if(!wrap.contains(e.target)) dd.classList.remove('show');
  }, {capture:true});
}
function highlightAC(items){
  items.forEach(function(el,i){ el.classList.toggle('focused', i===acFocusIdx); });
  if(items[acFocusIdx]) items[acFocusIdx].scrollIntoView({block:'nearest'});
}
function showAC(input, dd){
  const q = input.value.trim().toLowerCase();
  acFocusIdx = -1;
  if(q.length < 1){ dd.classList.remove('show'); return; }
  const matches = MASTER.filter(function(x){ return x.name.toLowerCase().includes(q); }).slice(0,12);
  if(!matches.length){
    dd.innerHTML = '<div class="ac-no-match">No match — will save as new item</div>';
  } else {
    dd.innerHTML = matches.map(function(x, i){
      return '<div class="ac-item" data-idx="'+i+'">' +
        '<div class="ac-item-name">'+esc(x.name)+'</div>' +
        '<div class="ac-item-meta">' +
          (x.diet ? '<span class="diet '+dietClass(x.diet)+'">'+esc(x.diet)+'</span>' : '') +
          (x.allergens ? '<br><span style="color:var(--sub)">⚠ '+esc(x.allergens.substring(0,30))+'</span>' : '') +
        '</div></div>';
    }).join('');
    dd.querySelectorAll('.ac-item').forEach(function(el, i){
      el.onclick = function(){
        const m = matches[i];
        input.value = m.name;
        // Fill sibling diet/allergen fields if present in the same row
        const row = input.closest('.menu-edit-row');
        if(row){
          const inputs = row.querySelectorAll('.form-input');
          // inputs: [name, qty, diet]
          if(inputs[2]) inputs[2].value = m.diet||'';
          // Trigger oninput for array update
          const idx = input.dataset.idx;
          if(idx !== undefined){
            editingMenuRows[idx].name = m.name;
            editingMenuRows[idx].diet = m.diet||'';
            editingMenuRows[idx].allergens = m.allergens||'';
            if(inputs[2]) { inputs[2].dispatchEvent(new Event('input')); }
          }
        }
        dd.classList.remove('show');
      };
    });
  }
  dd.classList.add('show');
}
