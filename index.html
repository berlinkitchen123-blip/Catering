<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>🍽 BB Kitchen — 8 Jun–14 Jun 2026</title>
<style>
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#222638; --border:#2e3248;
  --accent:#f97316; --accent2:#fb923c; --text:#e2e8f0; --muted:#94a3b8;
  --green:#22c55e; --yellow:#eab308; --red:#ef4444; --blue:#3b82f6;
  --meat:#f87171; --vegan:#4ade80; --veg:#86efac; --pesc:#60a5fa;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* Top bar */
#topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:10px 20px;
  display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
#topbar h1 { font-size:1.1rem; font-weight:700; color:var(--accent); }
#topbar .week { font-size:.85rem; color:var(--muted); }
#btnMtg { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:8px 16px;
  font-size:.85rem; font-weight:600; cursor:pointer; transition:.2s; }
#btnMtg:hover { background:var(--accent2); }

/* Day tabs */
#daytabs { background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; padding:0 16px; overflow-x:auto; gap:4px; }
.daytab { padding:10px 16px; font-size:.82rem; font-weight:600; color:var(--muted);
  border-bottom:2px solid transparent; cursor:pointer; white-space:nowrap; transition:.2s; }
.daytab.active { color:var(--accent); border-color:var(--accent); }
.daytab.bom-tab { color:var(--blue); }
.daytab.bom-tab.active { color:var(--blue); border-color:var(--blue); }

/* Main layout */
#main { display:flex; height:calc(100vh - 96px); }

/* Sidebar */
#sidebar { width:280px; min-width:220px; background:var(--surface); border-right:1px solid var(--border);
  overflow-y:auto; padding:12px 8px; display:flex; flex-direction:column; gap:6px; }
.ev-card { background:var(--surface2); border:1px solid var(--border); border-radius:10px;
  padding:12px; cursor:pointer; transition:.2s; }
.ev-card:hover { border-color:var(--accent); }
.ev-card.active { border-color:var(--accent); background:#1e2235; }
.ev-card .ev-client { font-weight:700; font-size:.95rem; }
.ev-card .ev-meta { font-size:.75rem; color:var(--muted); margin-top:2px; }
.ev-card .ev-pct { font-size:.72rem; font-weight:600; margin-top:6px; }
.pct-bar { height:4px; background:var(--border); border-radius:2px; margin-top:4px; }
.pct-fill { height:100%; border-radius:2px; background:var(--green); transition:.4s; }

/* Content */
#content { flex:1; overflow-y:auto; padding:24px; }
#content h2 { font-size:1.3rem; font-weight:700; margin-bottom:4px; }
#content .sub { font-size:.85rem; color:var(--muted); margin-bottom:20px; }

/* Section cards */
.section-card { background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:18px; margin-bottom:16px; }
.section-card h3 { font-size:.95rem; font-weight:700; margin-bottom:12px; color:var(--accent); }

/* Equipment list */
.equip-list { display:flex; flex-wrap:wrap; gap:8px; }
.equip-tag { background:var(--surface2); border:1px solid var(--border); border-radius:6px;
  padding:4px 10px; font-size:.8rem; display:flex; align-items:center; gap:6px; }
.equip-tag input { accent-color:var(--green); width:14px; height:14px; cursor:pointer; }
.equip-tag.done { opacity:.5; text-decoration:line-through; }

/* Menu table */
.menu-table { width:100%; border-collapse:collapse; font-size:.85rem; }
.menu-table th { text-align:left; padding:6px 10px; color:var(--muted);
  border-bottom:1px solid var(--border); font-weight:600; font-size:.78rem; }
.menu-table td { padding:8px 10px; border-bottom:1px solid var(--border); vertical-align:middle; }
.menu-table tr:last-child td { border-bottom:none; }
.menu-table tr.done td { opacity:.45; }
.menu-table .recipe-link { color:var(--accent); cursor:pointer; text-decoration:underline dotted;
  font-weight:600; }
.menu-table .recipe-link:hover { color:var(--accent2); }
.diet-badge { font-size:.7rem; font-weight:700; padding:2px 7px; border-radius:20px; white-space:nowrap; }
.diet-Meat { background:#7f1d1d; color:var(--meat); }
.diet-Vegan { background:#14532d; color:var(--vegan); }
.diet-Vegetarian { background:#166534; color:var(--veg); }
.diet-Pescatarian { background:#1e3a8a; color:var(--blue); }
.diet-other { background:#292524; color:var(--muted); }

/* Bulk actions */
.bulk-btns { display:flex; gap:8px; margin-bottom:12px; }
.bulk-btn { background:var(--surface2); border:1px solid var(--border); border-radius:6px;
  padding:5px 12px; font-size:.78rem; cursor:pointer; color:var(--text); transition:.2s; }
.bulk-btn:hover { border-color:var(--accent); color:var(--accent); }

/* BOM view */
#bom-view { padding:24px; }
#bom-view h2 { font-size:1.3rem; font-weight:700; margin-bottom:4px; }
#bom-view .sub { font-size:.85rem; color:var(--muted); margin-bottom:20px; }
#bom-search { background:var(--surface); border:1px solid var(--border); border-radius:8px;
  padding:8px 14px; color:var(--text); font-size:.9rem; width:100%; max-width:400px;
  margin-bottom:16px; }
#bom-search:focus { outline:none; border-color:var(--blue); }
.bom-table { width:100%; border-collapse:collapse; font-size:.85rem; }
.bom-table th { text-align:left; padding:8px 12px; color:var(--muted);
  border-bottom:1px solid var(--border); font-weight:600; font-size:.78rem; position:sticky; top:0;
  background:var(--bg); }
.bom-table td { padding:8px 12px; border-bottom:1px solid var(--border); }
.bom-table tr:hover td { background:var(--surface); }
.bom-table .qty-val { font-weight:700; color:var(--accent); }

/* Recipe modal */
#modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75);
  z-index:200; align-items:center; justify-content:center; }
#modal-overlay.open { display:flex; }
#modal { background:var(--surface); border:1px solid var(--border); border-radius:16px;
  max-width:820px; width:95vw; max-height:88vh; overflow-y:auto; padding:28px;
  position:relative; }
#modal-close { position:absolute; top:16px; right:16px; background:var(--surface2);
  border:1px solid var(--border); border-radius:6px; padding:4px 10px; cursor:pointer;
  color:var(--text); font-size:.85rem; }
#modal-close:hover { border-color:var(--accent); color:var(--accent); }
#modal h2 { font-size:1.2rem; font-weight:700; margin-bottom:6px; padding-right:60px; }
.modal-meta { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
.modal-tag { font-size:.75rem; padding:3px 9px; border-radius:20px; font-weight:600; }
.modal-tag.allergen { background:#451a03; color:#fdba74; }
.modal-section { margin-bottom:20px; }
.modal-section h4 { font-size:.85rem; font-weight:700; color:var(--accent); margin-bottom:10px;
  text-transform:uppercase; letter-spacing:.06em; border-bottom:1px solid var(--border); padding-bottom:6px; }
.ing-table { width:100%; border-collapse:collapse; font-size:.83rem; }
.ing-table th { text-align:left; padding:5px 8px; color:var(--muted); font-size:.75rem; font-weight:600; }
.ing-table td { padding:6px 8px; border-bottom:1px solid var(--border); }
.ing-table tr:last-child td { border-bottom:none; }
.ing-table .note { font-size:.75rem; color:var(--muted); }
.step-list { list-style:none; counter-reset:steps; }
.step-list li { counter-increment:steps; display:flex; gap:12px; margin-bottom:10px;
  font-size:.85rem; }
.step-list li::before { content:counter(steps); background:var(--accent); color:#fff;
  border-radius:50%; width:22px; height:22px; display:flex; align-items:center;
  justify-content:center; font-size:.75rem; font-weight:700; flex-shrink:0; margin-top:1px; }
.cooking-table { width:100%; border-collapse:collapse; font-size:.82rem; }
.cooking-table th { text-align:left; padding:5px 8px; color:var(--muted); font-size:.75rem; font-weight:600; }
.cooking-table td { padding:6px 8px; border-bottom:1px solid var(--border); }
.cooking-table tr:last-child td { border-bottom:none; }
.logistics-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.log-item { background:var(--surface2); border-radius:8px; padding:12px; }
.log-item .log-label { font-size:.72rem; font-weight:700; color:var(--muted); text-transform:uppercase;
  letter-spacing:.06em; margin-bottom:6px; }
.log-item .log-val { font-size:.82rem; line-height:1.5; }
.empty-note { color:var(--muted); font-style:italic; font-size:.83rem; }

/* Meeting mode */
#meeting { display:none; position:fixed; inset:0; background:#000; z-index:300;
  flex-direction:column; }
#meeting.open { display:flex; }
#mtg-header { padding:20px 32px; display:flex; justify-content:space-between; align-items:center;
  border-bottom:1px solid #222; }
#mtg-header h1 { font-size:1.3rem; font-weight:800; color:var(--accent); }
#mtg-header .nav { display:flex; gap:12px; align-items:center; }
#mtg-header .nav button { background:#111; border:1px solid #333; border-radius:8px;
  padding:8px 18px; color:#fff; cursor:pointer; font-size:.9rem; transition:.2s; }
#mtg-header .nav button:hover { border-color:var(--accent); color:var(--accent); }
#mtg-header .nav .counter { font-size:.85rem; color:var(--muted); }
#mtg-body { flex:1; overflow:hidden; display:flex; }
#mtg-main { flex:1; padding:40px; overflow-y:auto; }
#mtg-main h2 { font-size:2.2rem; font-weight:800; margin-bottom:8px; }
#mtg-main .mtg-date { font-size:1rem; color:var(--muted); margin-bottom:28px; }
.mtg-recipes { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
.mtg-recipe-card { background:#111; border:1px solid #222; border-radius:12px; padding:18px; }
.mtg-recipe-card .rc-name { font-size:1rem; font-weight:700; margin-bottom:6px; color:var(--text); }
.mtg-recipe-card .rc-meta { font-size:.8rem; color:var(--muted); }
.mtg-recipe-card .rc-portions { font-size:1.4rem; font-weight:800; color:var(--accent); }
#mtg-sidebar { width:240px; background:#0a0a0a; border-left:1px solid #222;
  padding:20px; overflow-y:auto; }
#mtg-sidebar h3 { font-size:.85rem; font-weight:700; color:var(--muted); text-transform:uppercase;
  letter-spacing:.08em; margin-bottom:12px; }
.mtg-ev-item { padding:8px 12px; border-radius:8px; cursor:pointer; font-size:.85rem;
  color:var(--muted); margin-bottom:4px; transition:.2s; }
.mtg-ev-item:hover { background:#111; color:var(--text); }
.mtg-ev-item.active { background:#1e2235; color:var(--accent); font-weight:600; }
</style>
</head>

s of cider vinegar straight away to prevent browning", "3. Whisk together cider vinegar, olive oil, Dijon mustard, honey, salt and pepper until emulsified — Taste and adjust acid/sweet balance before adding to vegetables", "4. Pour dressing over kohlrabi and apple; toss thoroughly to coat — Bound slaw — dressing is fully combined in kitchen; no separation for transport", "5. Add chopped dill; fold through gently — Add dill after dressing to prevent bruising", "6. Rest dressed slaw for minimum 15 minutes in refrigerator before tasting; adjust seasoning — Kohlrabi and apple release a small amount of liquid as they rest; this is normal and improves dressing integration", "7. Transfer to GN tray; cover with film; refrigerate until dispatch — Slaw improves with resting time up to 4 hours; do not prep more than 12 hours in advance"], "cooking_stages": [{"stage": "Cold holding (dressed)", "mode": "Refrigeration", "temp": "2–4°C", "time": "Up to 12 hrs", "humidity": "N/A", "notes": "Flavour improves with resting; texture remains good up to 12 hrs; beyond this apple softens noticeably"}, {"stage": "Service", "mode": "Cold buffet (unheated)", "temp": "-", "time": "-", "humidity": "N/A", "notes": "No chafing dish; cold buffet service only; travels and serves fully dressed"}], "transport": "GN tray with film cover; chilled transport. Slaw fully dressed and rested in kitchen before loading. No components travel separately.", "rational": "Not applicable.", "buffet": "Good. Kohlrabi is significantly more robust than cabbage-based slaws; holds texture and crunch well for 60–75 minutes on a cold buffet. Apple will soften gradually after dressing but remains pleasant within the service window. Some liquid pooling at base of GN tray is normal — stir gently before placing on buffet. Maximum recommended service window: 75 minutes.", "regen": "Not applicable — cold dish."}, "Braised Pointed Cabbage with Caraway & Apple Cider Vinegar": {"diet": "Vegetarian", "allergens": "", "category": " pice in butter releases flavour", "5. Add cabbage; toss to coat in butter and onion base — Light coating before liquid is added improves flavour absorption", "6. Deglaze with half the apple cider vinegar; add vegetable stock and sugar; season with salt and pepper — Liquid should come approximately one-third up the cabbage; not submerged", "7. Cover and braise on hob or in Rational until cabbage is tender but retains slight structure; see Cooking / Holding — Do not braise to full collapse; cabbage will continue to soften in chafing dish", "8. Remove lid; reduce braising liquid briefly if excess remains; stir in remaining apple cider vinegar; taste and adjust seasoning — Final acid addition brightens the dish; all finishing completed in kitchen before dispatch"], "cooking_stages": [{"stage": "Braising", "mode": "Combi steam", "temp": "100°C", "time": "18–22 min", "humidity": "0.8", "notes": "Cover GN tray tightly with lid or foil; check at 18 min — cabbage should be tender with slight resistance"}, {"stage": "Sauce reduction", "mode": "Hob", "temp": "Medium heat", "time": "3–5 min", "humidity": "N/A", "notes": "If excess braising liquid remains after Rational; reduce briefly in tray or pan before final seasoning"}, {"stage": "Hot holding", "mode": "Chafing dish", "temp": "Min 65°C", "time": "Max 90 min", "humidity": "N/A", "notes": "Cabbage will continue to soften in holding; this is within acceptable range; braising liquid keeps it moist and flavourful throughout service window"}, {"stage": "Regeneration", "mode": "Combi steam", "temp": "95°C", "time": "10–12 min", "humidity": "0.8", "notes": "Cover tray during regen; add a small splash of stock or water if braising liquid has been fully absorbed"}], "transport": "GN tray with lid; hot insulated transport. Fully finished and seasoned in kitchen. Braising liquid travels with the cabbage in the same tray — do not drain.", "rational": "Hob braise as per fallback above. Covered tightly throughout. Monitor liquid level during cooking.", "buffet": "Good. Braising liquid in the tray keeps cabbage moist and flavourful throughout service. Texture softens progressively but remains pleasant. Caraway flavour deepens in holding — positive. Maximum recommended service window: 90 minutes.", "regen": "Cook-chill suitable. Chill to below 3°C within 90 minutes of cooking. Regen covered per instructions above. Add a small amount of stock if liquid has been fully absorbed during chilling."}, "Roasted Sweet Potato Cubes with Smoked Paprika & Olive Oil": {"diet": "Vegan", "allergens": "", "category": "Side", "ingredients": [{"name": "Sweet potato", "qty": "0.195 kg", "total": "5.85 kg", "note": "whole unpeeled; Gross; yields approx 0,146 kg peeled and cubed; further roasting loss to approx 0,130 kg finished; [estimate — validate in kitchen]"}, {"name": "Olive oil", "qty": "0.01 l", "total": "0.3 l", "note": "For roasting; coat cubes evenly"}, {"name": "Sweet smoked paprika", "qty": "0.003 kg", "total": "0.09 kg", "note": "Smoked paprika; 3g; use sweet smoked paprika; not hot; toss with oil before roasting"}, {"name": "Garlic powder", "qty": "0.001 kg", "total": "0.03 kg", "note": "1g; background seasoning; optional but recommended"}, {"name": "Salt", "qty": "0.002 kg", "total": "0.06 kg", "note": "2g; season before roasting"}, {"name": "Black Pepper", "qty": "0.001 kg", "total": "0.03 kg", "note": "ground; 1g"}, {"name": "Parsley", "qty": "0.005 kg", "total": "0.15 kg", "note": "Fresh flat-leaf; Gross; yields approx 0,003 kg usable; chopped; added in kitchen after roasting before dispatch"}], "instructions": ["1. Peel sweet potatoes; cut into even cubes approx 2–2,5 cm — Even sizing critical for uniform roasting; smaller cubes collapse and become mushy in holding", "2. Toss cubes with olive oil, smoked paprika, garlic powder, salt and pepper — Coat evenly; oil must cover all surfaces to prevent drying in oven", "3. Spread in a single layer on GN tray; do not stack or crowd — Crowding causes steaming name": "White pepper", "unit": "kg", "qty": "0.33"}, {"name": "Zucchini", "unit": "kg", "qty": "11.2"}];

// ─── State ────────────────────────────────────────────────────────────────────
const S = { day: 0, evId: null, checks: {}, mtgIdx: 0, bomMode: false };

// ─── Init ─────────────────────────────────────────────────────────────────────
document.getElementById('week-label').textContent = WEEK_LABEL;
document.getElementById('bom-week-label').textContent = WEEK_LABEL;
buildDayTabs();
setDay(0);

function buildDayTabs() {
  const c = document.getElementById('daytabs');
  DAY_NAMES.forEach((d, i) => {
    const t = document.createElement('div');
    t.className = 'daytab'; t.textContent = d.split(' ')[0] + ' ' + d.split(' ')[1];
    t.onclick = () => { S.bomMode = false; setDay(i); };
    c.appendChild(t);
  });
  // BOM tab
  const bom = document.createElement('div');
  bom.className = 'daytab bom-tab'; bom.textContent = '📦 BOM';
  bom.onclick = () => openBom();
  c.appendChild(bom);
}

function setDay(d) {
  S.day = d; S.bomMode = false;
  document.querySelectorAll('.daytab').forEach((t,i) => {
    t.classList.toggle('active', i === d);
  });
  document.getElementById('main').style.display = 'flex';
  document.getElementById('bom-view').style.display = 'none';
  renderSidebar();
  // auto-select first event on this day
  const first = EVENTS.find(e => e.day === d);
  if (first) selEv(first.id); else document.getElementById('content').innerHTML = '';
}

function openBom() {
  S.bomMode = true;
  document.querySelectorAll('.daytab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.daytab.bom-tab')[0].classList.add('active');
  document.getElementById('main').style.display = 'none';
  document.getElementById('bom-view').style.display = 'block';
  renderBom();
}

// ─── Sidebar ─────────────────────────────────────────────────────────────────
function renderSidebar() {
  const dayEvs = EVENTS.filter(e => e.day === S.day);
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  dayEvs.forEach(ev => {
    const p = pct(ev.id);
    const div = document.createElement('div');
    div.className = 'ev-card' + (ev.id === S.evId ? ' active' : '');
    div.innerHTML = `
      <div class="ev-client">${ev.client}</div>
      <div class="ev-meta">${ev.date}</div>
      <div class="ev-meta">${ev.menu.length} recipes</div>
      <div class="ev-pct" style="color:${p===100?'var(--green)':p>0?'var(--yellow)':'var(--muted)'}">
        ${p}% complete
      </div>
      <div class="pct-bar"><div class="pct-fill" style="width:${p}%"></div></div>`;
    div.onclick = () => selEv(ev.id);
    sb.appendChild(div);
  });
}

function selEv(id) {
  S.evId = id;
  renderSidebar();
  renderContent();
}

// ─── Content ─────────────────────────────────────────────────────────────────
function renderContent() {
  const ev = EVENTS.find(e => e.id === S.evId);
  if (!ev) return;
  const c = document.getElementById('content');

  // Equipment section
  const eqHtml = ev.equip.length
    ? ev.equip.map((e,i) => `
        <label class="equip-tag ${ch(ev.id,'eq',i)?'done':''}">
          <input type="checkbox" ${ch(ev.id,'eq',i)?'checked':''} onchange="togEq('${ev.id}',${i})">
          ${e}
        </label>`).join('')
    : '<span class="empty-note">No equipment specified</span>';

  // Menu table
  const menuHtml = ev.menu.map((m,i) => {
    const dc = dietClass(m.diet);
    const done = ch(ev.id,'mn',i);
    return `<tr class="${done?'done':''}">
      <td><input type="checkbox" ${done?'checked':''} onchange="togMn('${ev.id}',${i})" style="accent-color:var(--green);cursor:pointer"></td>
      <td><span class="recipe-link" onclick="openRecipe('${esc(m.name)}')">${m.name}</span></td>
      <td><span class="diet-badge diet-${dc}">${m.diet||'—'}</span></td>
      <td style="font-weight:700;color:var(--accent)">${m.portions||'—'}</td>
      <td style="color:var(--muted)">${m.category||'—'}</td>
      <td style="color:var(--muted)">${m.packaging||'—'}</td>
      <td style="color:var(--muted)">${m.chafing||'—'}</td>
    </tr>`;
  }).join('');

  c.innerHTML = `
    <h2>${ev.client}</h2>
    <p class="sub">${ev.date}</p>

    <div class="section-card">
      <h3>🎒 Equipment & Kit</h3>
      <div class="bulk-btns">
        <button class="bulk-btn" onclick="chkAll('${ev.id}','eq')">✓ Check All</button>
        <button class="bulk-btn" onclick="unchkAll('${ev.id}','eq')">✗ Uncheck All</button>
      </div>
      <div class="equip-list">${eqHtml}</div>
    </div>

    <div class="section-card">
      <h3>🍽 Menu</h3>
      <div class="bulk-btns">
        <button class="bulk-btn" onclick="chkAll('${ev.id}','mn')">✓ Check All</button>
        <button class="bulk-btn" onclick="unchkAll('${ev.id}','mn')">✗ Uncheck All</button>
      </div>
      <table class="menu-table">
        <thead><tr>
          <th></th><th>Recipe</th><th>Diet</th><th>Portions</th>
          <th>Category</th><th>Packaging</th><th>Chafing</th>
        </tr></thead>
        <tbody>${menuHtml}</tbody>
      </table>
    </div>`;
}

// ─── Checks ───────────────────────────────────────────────────────────────────
function ch(id, type, i) {
  const k = `${id}-${type}-${i}`;
  return S.checks[k] || false;
}
function pct(id) {
  const ev = EVENTS.find(e => e.id === id);
  if (!ev) return 0;
  const total = ev.equip.length + ev.menu.length;
  if (!total) return 0;
  let done = 0;
  ev.equip.forEach((_,i) => { if(ch(id,'eq',i)) done++; });
  ev.menu.forEach((_,i) => { if(ch(id,'mn',i)) done++; });
  return Math.round(done/total*100);
}
function togEq(id, i) {
  S.checks[`${id}-eq-${i}`] = !ch(id,'eq',i);
  renderSidebar(); renderContent();
}
function togMn(id, i) {
  S.checks[`${id}-mn-${i}`] = !ch(id,'mn',i);
  renderSidebar(); renderContent();
}
function chkAll(id, type) {
  const ev = EVENTS.find(e => e.id === id);
  const arr = type === 'eq' ? ev.equip : ev.menu;
  arr.forEach((_,i) => S.checks[`${id}-${type}-${i}`] = true);
  renderSidebar(); renderContent();
}
function unchkAll(id, type) {
  const ev = EVENTS.find(e => e.id === id);
  const arr = type === 'eq' ? ev.equip : ev.menu;
  arr.forEach((_,i) => S.checks[`${id}-${type}-${i}`] = false);
  renderSidebar(); renderContent();
}

// ─── Recipe modal ─────────────────────────────────────────────────────────────
function openRecipe(name) {
  const r = RECIPES[name];
  const overlay = document.getElementById('modal-overlay');
  const body = document.getElementById('modal-body');
  if (!r) { body.innerHTML = `<h2>${name}</h2><p class="empty-note">No recipe detail found.</p>`; }
  else {
    const allergenTags = r.allergens
      ? r.allergens.split(',').map(a => `<span class="modal-tag allergen">⚠ ${a.trim()}</span>`).join('')
      : '';
    const dcl = `diet-badge diet-${dietClass(r.diet)}`;
    const ingredientsHtml = r.ingredients.length ? `
      <table class="ing-table">
        <thead><tr><th>Ingredient</th><th>Per Portion</th><th>Total</th><th>Note</th></tr></thead>
        <tbody>${r.ingredients.map(ing => `
          <tr>
            <td>${ing.name}</td>
            <td style="white-space:nowrap">${ing.qty}</td>
            <td style="color:var(--accent);white-space:nowrap">${ing.total}</td>
            <td class="note">${ing.note}</td>
          </tr>`).join('')}
        </tbody>
      </table>` : '<p class="empty-note">No ingredient data.</p>';

    const stepsHtml = r.instructions.length ? `
      <ol class="step-list">${r.instructions.map(s => `<li>${s}</li>`).join('')}</ol>`
      : '<p class="empty-note">No prep steps recorded.</p>';

    const cookHtml = r.cooking_stages.length ? `
      <table class="cooking-table">
        <thead><tr><th>Stage</th><th>Mode</th><th>Temp</th><th>Time</th><th>Humidity</th><th>Notes</th></tr></thead>
        <tbody>${r.cooking_stages.map(s => `
          <tr>
            <td>${s.stage}</td><td>${s.mode}</td><td>${s.temp}</td>
            <td>${s.time}</td><td>${s.humidity}</td><td style="color:var(--muted)">${s.notes}</td>
          </tr>`).join('')}
        </tbody>
      </table>` : '<p class="empty-note">No cooking stage data.</p>';

    const logGrid = `
      <div class="logistics-grid">
        <div class="log-item"><div class="log-label">🚚 Transport</div>
          <div class="log-val">${r.transport || '<em class="empty-note">—</em>'}</div></div>
        <div class="log-item"><div class="log-label">📊 Buffet Stability</div>
          <div class="log-val">${r.buffet || '<em class="empty-note">—</em>'}</div></div>
        <div class="log-item"><div class="log-label">🔥 Rational/Regen</div>
          <div class="log-val">${r.rational || '<em class="empty-note">—</em>'}</div></div>
        <div class="log-item"><div class="log-label">♻ Regeneration</div>
          <div class="log-val">${r.regen || '<em class="empty-note">—</em>'}</div></div>
      </div>`;

    body.innerHTML = `
      <h2>${name}</h2>
      <div class="modal-meta">
        <span class="${dcl}">${r.diet||'Unknown diet'}</span>
        <span class="modal-tag" style="background:var(--surface2);color:var(--muted)">${r.category}</span>
        ${allergenTags}
      </div>
      <div class="modal-section"><h4>📦 Ingredients</h4>${ingredientsHtml}</div>
      <div class="modal-section"><h4>📋 Preparation Steps</h4>${stepsHtml}</div>
      <div class="modal-section"><h4>🌡 Cooking Stages</h4>${cookHtml}</div>
      <div class="modal-section"><h4>🚚 Logistics & Holding</h4>${logGrid}</div>`;
  }
  overlay.classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOut(e) { if(e.target === document.getElementById('modal-overlay')) closeModal(); }

// ─── BOM ──────────────────────────────────────────────────────────────────────
function renderBom() {
  const tb = document.getElementById('bom-tbody');
  tb.innerHTML = BOM.map((b,i) => `
    <tr>
      <td style="color:var(--muted)">${i+1}</td>
      <td>${b.name}</td>
      <td style="color:var(--muted)">${b.unit}</td>
      <td class="qty-val">${b.qty}</td>
    </tr>`).join('');
}
function filterBom(q) {
  const rows = document.querySelectorAll('#bom-tbody tr');
  const lq = q.toLowerCase();
  rows.forEach(r => {
    r.style.display = r.cells[1].textContent.toLowerCase().includes(lq) ? '' : 'none';
  });
}

// ─── Meeting mode ──────────────────────────────────────────────────────────────
function openMeeting() {
  S.mtgIdx = 0;
  const m = document.getElementById('meeting');
  m.classList.add('open');
  // Build sidebar list
  const list = document.getElementById('mtg-ev-list');
  list.innerHTML = EVENTS.map((ev,i) => `
    <div class="mtg-ev-item${i===0?' active':''}" onclick="jumpMtg(${i})">
      ${ev.date.split(' ')[0]} · ${ev.client}
    </div>`).join('');
  renderMeeting();
  document.addEventListener('keydown', mtgKeys);
}
function closeMeeting() {
  document.getElementById('meeting').classList.remove('open');
  document.removeEventListener('keydown', mtgKeys);
}
function mtgKeys(e) {
  if(e.key==='Escape') closeMeeting();
  if(e.key==='ArrowRight'||e.key==='ArrowDown') nextEvent();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') prevEvent();
}
function nextEvent() { if(S.mtgIdx < EVENTS.length-1) { S.mtgIdx++; renderMeeting(); } }
function prevEvent() { if(S.mtgIdx > 0) { S.mtgIdx--; renderMeeting(); } }
function jumpMtg(i) { S.mtgIdx = i; renderMeeting(); }
function renderMeeting() {
  const ev = EVENTS[S.mtgIdx];
  document.getElementById('mtg-counter').textContent = `${S.mtgIdx+1} / ${EVENTS.length}`;
  // sidebar highlight
  document.querySelectorAll('.mtg-ev-item').forEach((el,i) => {
    el.classList.toggle('active', i===S.mtgIdx);
  });
  const main = document.getElementById('mtg-main');
  const cards = ev.menu.map(m => {
    const dc = dietClass(m.diet);
    return `<div class="mtg-recipe-card">
      <div class="rc-portions">${m.portions}</div>
      <div class="rc-name">${m.name}</div>
      <div class="rc-meta">
        <span class="diet-badge diet-${dc}">${m.diet||'—'}</span>
        &nbsp;${m.category||''}
      </div>
      ${m.allergens ? `<div class="rc-meta" style="margin-top:6px;color:#fdba74;font-size:.75rem">⚠ ${m.allergens}</div>` : ''}
    </div>`;
  }).join('');
  main.innerHTML = `
    <h2>${ev.client}</h2>
    <p class="mtg-date">${ev.date} &nbsp;·&nbsp; ${ev.menu.length} recipes</p>
    <div class="mtg-recipes">${cards}</div>`;
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function dietClass(d) {
  if (!d) return 'other';
  const l = d.toLowerCase();
  if (l.includes('meat')) return 'Meat';
  if (l.includes('vegan')) return 'Vegan';
  if (l.includes('vegetarian')) return 'Vegetarian';
  if (l.includes('pescatarian')) return 'Pescatarian';
  return 'other';
}
function esc(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
</script>
