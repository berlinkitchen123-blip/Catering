<head>

<title>Bella & Bona — Kitchen</title>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--card2:#22263a;--border:#2e3350;--accent:#e8b84b;--accent2:#4b9ee8;--green:#4be88a;--red:#e84b4b;--text:#eef0f8;--muted:#8b90b0;--tag:#2e3350;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}
.nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:4px;overflow-x:auto;position:sticky;top:0;z-index:100;}
.nav-brand{color:var(--accent);font-weight:700;font-size:14px;padding:12px 10px 12px 0;border-right:1px solid var(--border);margin-right:8px;white-space:nowrap;}
.nav-tab{padding:14px 14px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);white-space:nowrap;transition:.15s;user-select:none;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.lock-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:5px;vertical-align:middle;}
.main{padding:20px 16px;max-width:1100px;margin:0 auto;}
.day-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.day-tab{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:13px;color:var(--muted);transition:.15s;}
.day-tab:hover,.day-tab.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600;}
.event-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:20px;overflow:hidden;}
.event-header{background:var(--card2);padding:16px 20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.event-title{font-size:18px;font-weight:700;flex:1;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.badge-guests{background:#1e3a5f;color:var(--accent2);}
.badge-type{background:#2a1e5f;color:#a78bfa;}
.event-meta{padding:12px 20px;display:flex;flex-wrap:wrap;gap:16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted);}
.event-body{padding:16px 20px;}
.section-head{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:16px 0 8px;}
.section-head:first-child{margin-top:0;}
.checklist{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px;}
.check-item{display:flex;align-items:center;gap:7px;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;cursor:pointer;font-size:13px;transition:.15s;user-select:none;}
.check-item.done{opacity:.5;text-decoration:line-through;background:#0f2a1a;border-color:#1a4a2a;}
.check-item input{width:15px;height:15px;accent-color:var(--green);pointer-events:none;}
.menu-table{width:100%;border-collapse:collapse;font-size:13px;}
.menu-table th{text-align:left;padding:8px 12px;background:var(--card2);color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.menu-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:top;}
.menu-table tr:last-child td{border-bottom:none;}
.diet-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
.diet-meat{background:#3a1f1f;color:#f87171;}
.diet-vegan{background:#1a3a1f;color:#4ade80;}
.diet-veg{background:#1f3a1f;color:#86efac;}
.diet-fish{background:#1f2a3a;color:#60a5fa;}
.diet-other{background:#2a2a1f;color:#fbbf24;}
.recipe-accordion{border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;}
.recipe-head{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;background:var(--card2);transition:.15s;}
.recipe-head:hover{background:#272b3f;}
.recipe-name{font-weight:600;font-size:14px;flex:1;}
.recipe-meta-tags{display:flex;gap:6px;flex-wrap:wrap;}
.recipe-body{display:none;padding:16px;border-top:1px solid var(--border);}
.recipe-body.open{display:block;}
.detail-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px;}
.detail-table th{text-align:left;padding:7px 10px;background:#1e2235;color:var(--muted);font-size:11px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.detail-table td{padding:8px 10px;border-bottom:1px solid rgba(46,51,80,.5);vertical-align:top;}
.detail-table tr:last-child td{border-bottom:none;}
.logistics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-top:6px;}
.logistics-item{background:var(--card2);border-radius:8px;padding:10px 12px;}
.schedule-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;}
.schedule-item{background:var(--card2);border-radius:8px;padding:10px 12px;text-align:center;}
.schedule-time{font-size:18px;font-weight:700;color:var(--accent);}
.schedule-label{font-size:11px;color:var(--muted);margin-top:2px;}
.bom-table,.gen-table{width:100%;border-collapse:collapse;font-size:13px;}
.bom-table th,.gen-table th{text-align:left;padding:8px 12px;background:var(--card2);color:var(--muted);font-size:11px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.bom-table td,.gen-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:top;}
.bom-table .rg{color:var(--accent);font-weight:600;background:rgba(232,184,75,.05);}
.gen-table .rg{color:var(--accent2);font-weight:600;background:rgba(75,158,232,.05);}
.pw-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.pw-overlay.show{display:flex;}
.pw-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:360px;text-align:center;}
.pw-box h2{font-size:20px;margin-bottom:6px;}
.pw-box p{color:var(--muted);font-size:13px;margin-bottom:20px;}
.pw-input{width:100%;padding:12px 16px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:16px;text-align:center;letter-spacing:.2em;outline:none;}
.pw-input:focus{border-color:var(--accent);}
.pw-btn{margin-top:12px;width:100%;padding:12px;background:var(--accent);color:#000;font-weight:700;font-size:14px;border:none;border-radius:8px;cursor:pointer;}
.pw-err{color:var(--red);font-size:13px;margin-top:8px;height:18px;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
.shake{animation:shake .4s;}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
.view{display:none;}
.empty{text-align:center;padding:40px;color:var(--muted);}
</style>
</head>

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function dietClass(d){
  if(!d) return 'diet-other'; d=d.toLowerCase();
  if(d.includes('meat')) return 'diet-meat';
  if(d.includes('vegan')) return 'diet-vegan';
  if(d.includes('veg')) return 'diet-veg';
  if(d.includes('fish')) return 'diet-fish';
  return 'diet-other';
}

// NAV
function buildNav(){
  const nav = document.getElementById('main-nav');
  nav.innerHTML = '<span class="nav-brand">Bella &amp; Bona &middot; '+esc(WEEK)+'</span>';
  const tabs = [
    {id:'beo',label:'&#128197; BEO',creator:false},
    {id:'bom',label:'&#128230; BOM',creator:false},
    {id:'creator',label:'&#128274; Creator',creator:false,isLock:true},
    {id:'orders',label:'&#128203; Client Orders',creator:true},
    {id:'ingredients',label:'&#129378; Order Quantities',creator:true},
  ];
  tabs.forEach(function(t){
    if(t.creator && !creatorUnlocked) return;
    const el = document.createElement('div');
    el.className = 'nav-tab'+(currentView===t.id?' active':'');
    el.innerHTML = t.label+(t.isLock?'<span class="lock-dot" style="background:'+(creatorUnlocked?'#4be88a':'#e84b4b')+'"></span>':'');
    el.onclick = (function(id){ return function(){ handleNavClick(id); }; })(t.id);
    nav.appendChild(el);
  });
}
function handleNavClick(id){
  if(id==='creator'){ if(creatorUnlocked){ lockCreator(); } else { openPw(); } return; }
  switchView(id);
}
function switchView(id){
  currentView=id;
  document.querySelectorAll('.view').forEach(function(v){ v.style.display='none'; });
  const t=document.getElementById('view-'+id);
  if(t) t.style.display='block';
  buildNav();
}

  if(ev.menu&&ev.menu.length){
    h+='<hr class="divider"><div class="section-head">Menu</div>';
    h+='<table class="menu-table"><thead><tr><th>Recipe</th><th>Portions</th><th>Diet</th><th>Packaging</th></tr></thead><tbody>';
    ev.menu.forEach(function(item){
      h+='<tr><td>'+esc(item.name)+'</td><td>'+esc(item.portions||'—')+'</td><td><span class="diet-tag '+dietClass(item.diet)+'">'+esc(item.diet||'—')+'</span></td><td>'+esc(item.packaging||'—')+'</td></tr>';
    });
    h+='</tbody></table>';
  }

  const recipeKeys=Object.keys(ev.recipes||{});
  if(recipeKeys.length){
    h+='<hr class="divider"><div class="section-head">Recipe Details</div>';
    recipeKeys.forEach(function(rname){
      const rd=ev.recipes[rname];
      const rid=eid+'-r-'+safeId(rname);
      h+='<div class="recipe-accordion"><div class="recipe-head" data-rid="'+rid+'" onclick="toggleRecipe(this.dataset.rid)">';
      h+='<span class="recipe-name">'+esc(rname)+'</span><div class="recipe-meta-tags">';
      if(rd.portions) h+='<span class="badge badge-guests" style="font-size:11px">'+esc(rd.portions)+'</span>';
      if(rd.diet) h+='<span class="diet-tag '+dietClass(rd.diet)+'">'+esc(rd.diet)+'</span>';
      if(rd.category) h+='<span class="badge" style="background:var(--tag);color:var(--muted);font-size:11px">'+esc(rd.category)+'</span>';
      if(rd.allergens) h+='<span class="badge" style="background:#2a1a1a;color:#fca5a5;font-size:11px">&#9888; '+esc(rd.allergens)+'</span>';
      h+='</div><span id="arr-'+rid+'" style="color:var(--muted);font-size:18px">&#8250;</span></div>';
      h+='<div class="recipe-body" id="rb-'+rid+'">';
      if(rd.ingredients&&rd.ingredients.length){
        h+='<div class="section-head">Ingredients</div><table class="detail-table"><thead><tr><th>Ingredient</th><th>Qty/Portion</th><th>Unit</th><th>Total/Notes</th></tr></thead><tbody>';
        rd.ingredients.forEach(function(ing){ h+='<tr><td>'+esc(ing.name)+'</td><td>'+esc(ing.qty_per_portion||'')+'</td><td>'+esc(ing.unit||'')+'</td><td>'+esc(ing.total_or_notes||'')+'</td></tr>'; });
        h+='</tbody></table>';
      }
      if(rd.steps&&rd.steps.length){
        h+='<div class="section-head" style="margin-top:14px">Preparation</div><table class="detail-table"><thead><tr><th>Step</th><th>Action</th><th>Notes</th></tr></thead><tbody>';
        rd.steps.forEach(function(s){ h+='<tr><td style="color:var(--accent);width:50px">'+esc(s.step)+'</td><td>'+esc(s.action)+'</td><td style="color:var(--muted)">'+esc(s.notes)+'</td></tr>'; });
        h+='</tbody></table>';
      }
      if(rd.cooking&&rd.cooking.length){
        h+='<div class="section-head" style="margin-top:14px">Cooking</div><table class="detail-table"><thead><tr><th>Stage</th><th>Mode</th><th>Temp</th><th>Time</th><th>Humidity</th></tr></thead><tbody>';
        rd.cooking.forEach(function(c){ h+='<tr><td>'+esc(c.stage)+'</td><td>'+esc(c.mode)+'</td><td>'+esc(c.temp)+'</td><td>'+esc(c.time)+'</td><td>'+esc(c.humidity)+'</td></tr>'; });
        h+='</tbody></table>';
      }
      if(rd.logistics&&Object.keys(rd.logistics).length){
        h+='<div class="section-head" style="margin-top:14px">Logistics</div><div class="logistics-grid">';
        Object.keys(rd.logistics).forEach(function(k){ h+='<div class="logistics-item"><div class="schedule-label">'+esc(k)+'</div><div>'+esc(rd.logistics[k])+'</div></div>'; });
        h+='</div>';
      }
      h+='</div></div>';
    });
  }
  h+='</div></div>';
  return h;
}
function toggleRecipe(rid){
  const b=document.getElementById('rb-'+rid), a=document.getElementById('arr-'+rid);
  if(!b) return;
  if(b.classList.contains('open')){ b.classList.remove('open'); a.innerHTML='&#8250;'; }
  else { b.classList.add('open'); a.innerHTML='&#8964;'; }
}

// CHECKLIST
function toggleCheck(key,eid){
  const cb=document.getElementById(key); if(!cb) return;
  cb.checked=!cb.checked;
  const ci=document.getElementById('ci-'+key); if(ci) ci.classList.toggle('done',cb.checked);
  checklistState[key]=cb.checked;
  db.collection('checklists').doc(eid).set(checklistState,{merge:true}).catch(function(){});
}
function loadChecklists(evs){
  fbListeners.forEach(function(u){u();}); fbListeners=[];
  evs.forEach(function(ev){
    const eid=eventId(ev);
    fbListeners.push(db.collection('checklists').doc(eid).onSnapshot(function(snap){
      if(!snap.exists) return;
      Object.entries(snap.data()).forEach(function(e){
        checklistState[e[0]]=e[1];
        const el=document.getElementById(e[0]), ci=document.getElementById('ci-'+e[0]);
        if(el) el.checked=e[1]; if(ci) ci.classList.toggle('done',e[1]);
      });
    }));
  });
}

// BOM VIEW
function buildBomView(){
  let h='<div class="main"><h2 style="margin-bottom:20px">&#128230; BOM &mdash; '+esc(WEEK)+'</h2>';
  EVENTS.forEach(function(ev){
    if(!ev.bom_summary||!ev.bom_summary.length) return;
    h+='<div class="event-card" style="margin-bottom:20px"><div class="event-header"><div class="event-title">'+esc(ev.client)+'</div><span class="badge badge-guests">'+esc(ev.date)+'</span><span class="badge badge-type">'+esc(ev.guests)+' guests</span></div>';
    h+='<table class="bom-table"><thead><tr><th>Recipe</th><th>Ingredient</th><th>Total</th><th>Unit</th></tr></thead><tbody>';
    let lr='';
    ev.bom_summary.forEach(function(item){
      if(item.recipe!==lr){ h+='<tr><td class="rg" colspan="4">'+esc(item.recipe)+'</td></tr>'; lr=item.recipe; }
      h+='<tr><td></td><td>'+esc(item.ingredient)+'</td><td><strong>'+esc(item.total)+'</strong></td><td>'+esc(item.unit)+'</td></tr>';
    });
    h+='</tbody></table></div>';
  });
  document.getElementById('view-bom').innerHTML=h+'</div>';
}

      h+='</tbody></table>';
    }
    h+='</div></div>';
