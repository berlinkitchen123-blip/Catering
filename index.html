<title>🍽 BB Kitchen — 15 Jun–21 Jun 2026</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#222638;--border:#2e3248;
  --accent:#f97316;--accent2:#fb923c;--text:#e2e8f0;--muted:#94a3b8;
  --green:#22c55e;--yellow:#eab308;--blue:#3b82f6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
#topbar h1{font-size:1.1rem;font-weight:700;color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:12px}
#week-label{font-size:.85rem;color:var(--muted)}
#sync-dot{font-size:.75rem;color:var(--green)}
#btnMtg{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 16px;
  font-size:.85rem;font-weight:600;cursor:pointer}
#btnMtg:hover{background:var(--accent2)}
#daytabs{background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;padding:0 16px;overflow-x:auto;gap:4px}
.daytab{padding:10px 16px;font-size:.82rem;font-weight:600;color:var(--muted);
  border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:.2s}
.daytab.active{color:var(--accent);border-color:var(--accent)}
.daytab.bom-tab.active{color:var(--blue);border-color:var(--blue)}
#main{display:flex;height:calc(100vh - 96px)}
#sidebar{width:280px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);
  overflow-y:auto;padding:12px 8px;display:flex;flex-direction:column;gap:6px}
.ev-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:12px;cursor:pointer;transition:.2s}
.ev-card:hover{border-color:var(--accent)}
.ev-card.active{border-color:var(--accent);background:#1e2235}
.ev-card .ev-client{font-weight:700;font-size:.95rem}
.ev-card .ev-meta{font-size:.75rem;color:var(--muted);margin-top:2px}
.ev-card .ev-pct{font-size:.72rem;font-weight:600;margin-top:6px}
.pct-bar{height:4px;background:var(--border);border-radius:2px;margin-top:4px}
.pct-fill{height:100%;border-radius:2px;background:var(--green);transition:.4s}
#content{flex:1;overflow-y:auto;padding:24px}
#content h2{font-size:1.3rem;font-weight:700;margin-bottom:4px}
.sub{font-size:.85rem;color:var(--muted);margin-bottom:20px}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:18px;margin-bottom:16px}
.section-card h3{font-size:.95rem;font-weight:700;margin-bottom:12px;color:var(--accent)}
.equip-list{display:flex;flex-wrap:wrap;gap:8px}
.equip-tag{background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  padding:4px 10px;font-size:.8rem;display:flex;align-items:center;gap:6px;cursor:pointer}
.equip-tag input{accent-color:var(--green);width:14px;height:14px;cursor:pointer}
.equip-tag.done{opacity:.5;text-decoration:line-through}
.menu-table{width:100%;border-collapse:collapse;font-size:.85rem}
.menu-table th{text-align:left;padding:6px 10px;color:var(--muted);
  border-bottom:1px solid var(--border);font-weight:600;font-size:.78rem}
.menu-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.menu-table tr:last-child td{border-bottom:none}
.menu-table tr.done td{opacity:.45}
.recipe-link{color:var(--accent);cursor:pointer;text-decoration:underline dotted;font-weight:600}
.recipe-link:hover{color:var(--accent2)}
.diet-badge{font-size:.7rem;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap}
.diet-Meat{background:#7f1d1d;color:#f87171}
.diet-Vegan{background:#14532d;color:#4ade80}
.diet-Vegetarian{background:#166534;color:#86efac}
.diet-Pescatarian{background:#1e3a8a;color:#60a5fa}
.diet-other{background:#292524;color:var(--muted)}
.bulk-btns{display:flex;gap:8px;margin-bottom:12px}
.bulk-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;
  padding:5px 12px;font-size:.78rem;cursor:pointer;color:var(--text);transition:.2s}
.bulk-btn:hover{border-color:var(--accent);color:var(--accent)}
#bom-view{padding:24px;display:none}
#bom-view h2{font-size:1.3rem;font-weight:700;margin-bottom:4px}
#bom-search{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:8px 14px;color:var(--text);font-size:.9rem;width:100%;max-width:400px;margin-bottom:16px}
#bom-search:focus{outline:none;border-color:var(--blue)}
.bom-table{width:100%;border-collapse:collapse;font-size:.85rem}
.bom-table th{text-align:left;padding:8px 12px;color:var(--muted);
  border-bottom:1px solid var(--border);font-weight:600;font-size:.78rem;
  position:sticky;top:0;background:var(--bg)}
.bom-table td{padding:8px 12px;border-bottom:1px solid var(--border)}
.bom-table tr:hover td{background:var(--surface)}
.qty-val{font-weight:700;color:var(--accent)}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:200;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
#modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  max-width:820px;width:95vw;max-height:88vh;overflow-y:auto;padding:28px;position:relative}
#modal-close{position:absolute;top:16px;right:16px;background:var(--surface2);
  border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;
  color:var(--text);font-size:.85rem}
#modal-close:hover{border-color:var(--accent);color:var(--accent)}
#modal h2{font-size:1.2rem;font-weight:700;margin-bottom:6px;padding-right:60px}
.modal-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.modal-tag{font-size:.75rem;padding:3px 9px;border-radius:20px;font-weight:600}
.modal-tag.allergen{background:#451a03;color:#fdba74}
.modal-section{margin-bottom:20px}
.modal-section h4{font-size:.85rem;font-weight:700;color:var(--accent);margin-bottom:10px;
  text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);padding-bottom:6px}
.ing-table{width:100%;border-collapse:collapse;font-size:.83rem}
.ing-table th{text-align:left;padding:5px 8px;color:var(--muted);font-size:.75rem;font-weight:600}
.ing-table td{padding:6px 8px;border-bottom:1px solid var(--border)}
.ing-table tr:last-child td{border-bottom:none}
.note-cell{font-size:.75rem;color:var(--muted)}
.step-list{list-style:none;counter-reset:steps}
.step-list li{counter-increment:steps;display:flex;gap:12px;margin-bottom:10px;font-size:.85rem}
.step-list li::before{content:counter(steps);background:var(--accent);color:#fff;border-radius:50%;
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  font-size:.75rem;font-weight:700;flex-shrink:0;margin-top:1px}
.cook-table{width:100%;border-collapse:collapse;font-size:.82rem}
.cook-table th{text-align:left;padding:5px 8px;color:var(--muted);font-size:.75rem;font-weight:600}
.cook-table td{padding:6px 8px;border-bottom:1px solid var(--border)}
.cook-table tr:last-child td{border-bottom:none}
.log-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.log-item{background:var(--surface2);border-radius:8px;padding:12px}
.log-label{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:6px}
.log-val{font-size:.82rem;line-height:1.5}
.empty-note{color:var(--muted);font-style:italic;font-size:.83rem}
#meeting{display:none;position:fixed;inset:0;background:#000;z-index:300;flex-direction:column}
#meeting.open{display:flex}
#mtg-header{padding:20px 32px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #222}
#mtg-header h1{font-size:1.3rem;font-weight:800;color:var(--accent)}
.mtg-nav{display:flex;gap:12px;align-items:center}
.mtg-nav button{background:#111;border:1px solid #333;border-radius:8px;padding:8px 18px;
  color:#fff;cursor:pointer;font-size:.9rem}
.mtg-nav button:hover{border-color:var(--accent);color:var(--accent)}
.mtg-counter{font-size:.85rem;color:var(--muted)}
#mtg-body{flex:1;overflow:hidden;display:flex}
#mtg-main{flex:1;padding:40px;overflow-y:auto}
#mtg-main h2{font-size:2.2rem;font-weight:800;margin-bottom:8px}
.mtg-date{font-size:1rem;color:var(--muted);margin-bottom:28px}
.mtg-recipes{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.mtg-card{background:#111;border:1px solid #222;border-radius:12px;padding:18px}
.mtg-card .rc-portions{font-size:1.4rem;font-weight:800;color:var(--accent)}
.mtg-card .rc-name{font-size:1rem;font-weight:700;margin-bottom:6px}
.mtg-card .rc-meta{font-size:.8rem;color:var(--muted)}
#mtg-sidebar{width:240px;background:#0a0a0a;border-left:1px solid #222;padding:20px;overflow-y:auto}
#mtg-sidebar h3{font-size:.85rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.mtg-ev{padding:8px 12px;border-radius:8px;cursor:pointer;font-size:.85rem;color:var(--muted);margin-bottom:4px}
.mtg-ev:hover{background:#111;color:var(--text)}
.mtg-ev.active{background:#1e2235;color:var(--accent);font-weight:600}
</style>

// ─── Tabs ─────────────────────────────────────────────────────────────────────
function buildTabs(){
  const c = document.getElementById('daytabs');
  DAY_NAMES.forEach((d,i)=>{
    const t = document.createElement('div');
    t.className='daytab'; t.textContent=d.split(' ')[0]+' '+d.split(' ')[1];
    t.onclick=()=>{S.bomMode=false;setDay(i);}; c.appendChild(t);
  });
  const b=document.createElement('div');
  b.className='daytab bom-tab';b.textContent='📦 BOM';b.onclick=openBom;c.appendChild(b);
}
function setDay(d){
  S.day=d;S.bomMode=false;
  document.querySelectorAll('.daytab').forEach((t,i)=>t.classList.toggle('active',i===d));
  document.getElementById('main').style.display='flex';
  document.getElementById('bom-view').style.display='none';
  renderSidebar();
  const first=EVENTS.find(e=>e.day===d);
  if(first)selEv(first.id); else document.getElementById('content').innerHTML='';
}
function openBom(){
  S.bomMode=true;
  document.querySelectorAll('.daytab').forEach(t=>t.classList.remove('active'));
  document.querySelector('.daytab.bom-tab').classList.add('active');
  document.getElementById('main').style.display='none';
  document.getElementById('bom-view').style.display='block';
  renderBom();
}

// ─── Sidebar ─────────────────────────────────────────────────────────────────
function renderSidebar(){
  const sb=document.getElementById('sidebar'); sb.innerHTML='';
  EVENTS.filter(e=>e.day===S.day).forEach(ev=>{
    const p=pct(ev);
    const d=document.createElement('div');
    d.className='ev-card'+(ev.id===S.evId?' active':'');
    d.innerHTML=`<div class="ev-client">${ev.client}</div>
      <div class="ev-meta">${ev.date}</div>
      <div class="ev-meta">${ev.menu.length} recipes</div>
      <div class="ev-pct" style="color:${p===100?'var(--green)':p>0?'var(--yellow)':'var(--muted)'}">${p}% complete</div>
      <div class="pct-bar"><div class="pct-fill" style="width:${p}%"></div></div>`;
    d.onclick=()=>selEv(ev.id); sb.appendChild(d);
  });
}
function selEv(id){S.evId=id;renderSidebar();renderContent();}

// ─── Content ──────────────────────────────────────────────────────────────────
function renderContent(){
  const ev=EVENTS.find(e=>e.id===S.evId); if(!ev)return;
  const c=checks[ev.id]||{};
  const eqH=ev.equip.length
    ?ev.equip.map((e,i)=>`<label class="equip-tag ${c['eq-'+i]?'done':''}">
        <input type="checkbox" ${c['eq-'+i]?'checked':''} onchange="togEq('${ev.id}',${i})"> ${e}
      </label>`).join('')
    :'<span class="empty-note">No equipment specified</span>';
  const mnH=ev.menu.map((m,i)=>{
    const done=!!c['mn-'+i];const dc=dClass(m.diet);
    return `<tr class="${done?'done':''}">
      <td><input type="checkbox" ${done?'checked':''} onchange="togMn('${ev.id}',${i})" style="accent-color:var(--green);cursor:pointer"></td>
      <td><span class="recipe-link" onclick="openRecipe(${JSON.stringify(m.name)})">${m.name}</span></td>
      <td><span class="diet-badge diet-${dc}">${m.diet||'—'}</span></td>
      <td style="font-weight:700;color:var(--accent)">${m.portions||'—'}</td>
      <td style="color:var(--muted)">${m.category||'—'}</td>
      <td style="color:var(--muted)">${m.packaging||'—'}</td>
      <td style="color:var(--muted)">${m.chafing||'—'}</td></tr>`;
  }).join('');
  document.getElementById('content').innerHTML=`
    <h2>${ev.client}</h2><p class="sub">${ev.date}</p>
    <div class="section-card"><h3>🎒 Equipment &amp; Kit</h3>
      <div class="bulk-btns">
        <button class="bulk-btn" onclick="chkAll('${ev.id}','eq')">✓ Check All</button>
        <button class="bulk-btn" onclick="unchkAll('${ev.id}','eq')">✗ Uncheck All</button>
      </div>
      <div class="equip-list">${eqH}</div></div>
    <div class="section-card"><h3>🍽 Menu</h3>
      <div class="bulk-btns">
        <button class="bulk-btn" onclick="chkAll('${ev.id}','mn')">✓ Check All</button>
        <button class="bulk-btn" onclick="unchkAll('${ev.id}','mn')">✗ Uncheck All</button>
      </div>
      <table class="menu-table">
        <thead><tr><th></th><th>Recipe</th><th>Diet</th><th>Portions</th><th>Category</th><th>Packaging</th><th>Chafing</th></tr></thead>
        <tbody>${mnH}</tbody></table></div>`;
}

// ─── Checklist + Firebase ─────────────────────────────────────────────────────
function subscribeChecklist(evId){
  if(unsubs[evId])return;
  unsubs[evId]=db.doc('checklists/'+evId).onSnapshot(snap=>{
    if(snap.exists){checks[evId]=snap.data().checks||{};}
    else{checks[evId]={};}
    if(S.evId===evId)renderContent();
    renderSidebar();
  });
}
function pct(ev){
  const c=checks[ev.id]||{};
  const total=ev.equip.length+ev.menu.length; if(!total)return 0;
  let done=0;
  ev.equip.forEach((_,i)=>{if(c['eq-'+i])done++;});
  ev.menu.forEach((_,i)=>{if(c['mn-'+i])done++;});
  return Math.round(done/total*100);
}
function saveCheck(id,key,val){
  checks[id]=checks[id]||{}; checks[id][key]=val;
  renderSidebar();renderContent();
  db.doc('checklists/'+id).set({checks:checks[id],updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}).catch(console.warn);
}
function togEq(id,i){const c=checks[id]||{};saveCheck(id,'eq-'+i,!c['eq-'+i]);}
function togMn(id,i){const c=checks[id]||{};saveCheck(id,'mn-'+i,!c['mn-'+i]);}
function chkAll(id,type){
  const ev=EVENTS.find(e=>e.id===id);const arr=type==='eq'?ev.equip:ev.menu;
  const u=checks[id]||{};arr.forEach((_,i)=>u[type+'-'+i]=true);checks[id]=u;
  renderSidebar();renderContent();
  db.doc('checklists/'+id).set({checks:u,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}).catch(console.warn);
}
function unchkAll(id,type){
  const ev=EVENTS.find(e=>e.id===id);const arr=type==='eq'?ev.equip:ev.menu;
  const u=checks[id]||{};arr.forEach((_,i)=>u[type+'-'+i]=false);checks[id]=u;
  renderSidebar();renderContent();
  db.doc('checklists/'+id).set({checks:u,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}).catch(console.warn);
}

// ─── Recipe modal ─────────────────────────────────────────────────────────────
function openRecipe(name){
  const r=RECIPES[name];const body=document.getElementById('modal-body');
  if(!r){body.innerHTML=`<h2>${name}</h2><p class="empty-note">No recipe detail.</p>`;}
  else{
    const aTags=(r.allergens||'').split(',').filter(Boolean).map(a=>`<span class="modal-tag allergen">⚠ ${a.trim()}</span>`).join('');
    const dc=dClass(r.diet);
    const ingH=(r.ingredients||[]).length?`<table class="ing-table">
      <thead><tr><th>Ingredient</th><th>Per Portion</th><th>Total</th><th>Note</th></tr></thead>
      <tbody>${(r.ingredients||[]).map(g=>`<tr><td>${g.name}</td>
        <td style="white-space:nowrap">${g.qty}</td>
        <td style="color:var(--accent);white-space:nowrap">${g.total}</td>
        <td class="note-cell">${g.note||''}</td></tr>`).join('')}</tbody></table>`
      :'<p class="empty-note">No ingredient data.</p>';
    const stH=(r.instructions||[]).length?`<ol class="step-list">${(r.instructions||[]).map(s=>`<li>${s}</li>`).join('')}</ol>`:'<p class="empty-note">No prep steps recorded.</p>';
    const ckH=(r.cooking_stages||[]).length?`<table class="cook-table">
      <thead><tr><th>Stage</th><th>Mode</th><th>Temp</th><th>Time</th><th>Humidity</th><th>Notes</th></tr></thead>
      <tbody>${(r.cooking_stages||[]).map(s=>`<tr><td>${s.stage}</td><td>${s.mode}</td><td>${s.temp}</td><td>${s.time}</td><td>${s.humidity}</td><td style="color:var(--muted)">${s.notes||''}</td></tr>`).join('')}</tbody></table>`
      :'<p class="empty-note">No cooking stage data.</p>';
    body.innerHTML=`<h2>${name}</h2>
      <div class="modal-meta"><span class="diet-badge diet-${dc}">${r.diet||'Unknown'}</span>
        <span class="modal-tag" style="background:var(--surface2);color:var(--muted)">${r.category||''}</span>${aTags}</div>
      <div class="modal-section"><h4>📦 Ingredients</h4>${ingH}</div>
      <div class="modal-section"><h4>📋 Preparation Steps</h4>${stH}</div>
      <div class="modal-section"><h4>🌡 Cooking Stages</h4>${ckH}</div>
      <div class="modal-section"><h4>🚚 Logistics &amp; Holding</h4>
        <div class="log-grid">
          <div class="log-item"><div class="log-label">🚚 Transport</div><div class="log-val">${r.transport||'<em class="empty-note">—</em>'}</div></div>
          <div class="log-item"><div class="log-label">📊 Buffet Stability</div><div class="log-val">${r.buffet||'<em class="empty-note">—</em>'}</div></div>
          <div class="log-item"><div class="log-label">🔥 Rational/Regen</div><div class="log-val">${r.rational||'<em class="empty-note">—</em>'}</div></div>
          <div class="log-item"><div class="log-label">♻ Regeneration</div><div class="log-val">${r.regen||'<em class="empty-note">—</em>'}</div></div>
        </div></div>`;
  }
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function closeModalOut(e){if(e.target.id==='modal-overlay')closeModal();}

// ─── BOM ──────────────────────────────────────────────────────────────────────
function renderBom(){
  document.getElementById('bom-tbody').innerHTML=BOM.map((b,i)=>`<tr>
    <td style="color:var(--muted)">${i+1}</td><td>${b.name}</td>
    <td style="color:var(--muted)">${b.unit}</td><td class="qty-val">${b.qty}</td></tr>`).join('');
}
function filterBom(q){
  document.querySelectorAll('#bom-tbody tr').forEach(r=>{
    r.style.display=r.cells[1].textContent.toLowerCase().includes(q.toLowerCase())?'':'none';
  });
}

// ─── Meeting ─────────────────────────────────────────────────────────────────
function openMeeting(){
  S.mtgIdx=0;document.getElementById('meeting').classList.add('open');
  document.getElementById('mtg-ev-list').innerHTML=EVENTS.map((ev,i)=>`
    <div class="mtg-ev${i===0?' active':''}" onclick="jumpMtg(${i})">${ev.date.split(' ')[0]} · ${ev.client}</div>`).join('');
  renderMtg();document.addEventListener('keydown',mtgKey);
}
function closeMeeting(){document.getElementById('meeting').classList.remove('open');document.removeEventListener('keydown',mtgKey);}
function mtgKey(e){if(e.key==='Escape')closeMeeting();if(e.key==='ArrowRight'||e.key==='ArrowDown')nextEv();if(e.key==='ArrowLeft'||e.key==='ArrowUp')prevEv();}
function nextEv(){if(S.mtgIdx<EVENTS.length-1){S.mtgIdx++;renderMtg();}}
function prevEv(){if(S.mtgIdx>0){S.mtgIdx--;renderMtg();}}
function jumpMtg(i){S.mtgIdx=i;renderMtg();}
function renderMtg(){
  const ev=EVENTS[S.mtgIdx];
  document.getElementById('mtg-ctr').textContent=`${S.mtgIdx+1} / ${EVENTS.length}`;
  document.querySelectorAll('.mtg-ev').forEach((el,i)=>el.classList.toggle('active',i===S.mtgIdx));
  document.getElementById('mtg-main').innerHTML=`<h2>${ev.client}</h2>
    <p class="mtg-date">${ev.date} · ${ev.menu.length} recipes</p>
    <div class="mtg-recipes">${ev.menu.map(m=>{const dc=dClass(m.diet);return`<div class="mtg-card">
      <div class="rc-portions">${m.portions}</div>
      <div class="rc-name">${m.name}</div>
      <div class="rc-meta"><span class="diet-badge diet-${dc}">${m.diet||'—'}</span> ${m.category||''}</div>
      ${m.allergens?`<div class="rc-meta" style="margin-top:6px;color:#fdba74;font-size:.75rem">⚠ ${m.allergens}</div>`:''}</div>`;}).join('')}</div>`;
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function dClass(d){
  if(!d)return 'other';const l=d.toLowerCase();
  if(l.includes('meat'))return 'Meat';if(l.includes('vegan'))return 'Vegan';
  if(l.includes('vegetarian'))return 'Vegetarian';if(l.includes('pescatarian'))return 'Pescatarian';
  return 'other';
}
